<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Přihlášení — Rentero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0c0e14;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #1e2130;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: #7c6dff;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 4px 16px rgba(124,109,255,0.4);
    }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #4b5563;
      margin-bottom: 5px;
    }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      color: #f1f5f9;
      font-family: inherit;
      transition: border-color 0.13s, box-shadow 0.13s;
    }
    .form-input:focus {
      outline: none;
      border-color: #7c6dff;
      box-shadow: 0 0 0 3px rgba(124,109,255,0.15);
    }
    .form-input::placeholder { color: #4b5563; }
    .btn-submit {
      width: 100%;
      background: #7c6dff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.13s;
      box-shadow: 0 2px 8px rgba(124,109,255,0.3);
    }
    .btn-submit:hover { background: #8b7dff; }
    .error-box {
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.2);
      border-radius: 7px;
      padding: 10px 12px;
      font-size: 13px;
      color: #f43f5e;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:20px;font-weight:700;color:#f1f5f9;letter-spacing:-0.01em;">Rentero</div>
      <div style="font-size:13px;color:#4b5563;margin-top:3px;">Správa nemovitostí</div>
    </div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" style="display:flex;flex-direction:column;gap:14px;">
      {{ csrf_input(request) }}
      <div>
        <label class="form-label">Uživatelské jméno</label>
        <input type="text" name="username" autocomplete="username" required class="form-input" autofocus>
      </div>
      <div>
        <label class="form-label">Heslo</label>
        <input type="password" name="password" autocomplete="current-password" required class="form-input">
      </div>
      <button type="submit" class="btn-submit" style="margin-top:4px;">Přihlásit se</button>
    </form>
  </div>
</body>
</html>
