<!DOCTYPE html>
<html lang="cs">
<head>
  <script>
    (function() {
      var t = localStorage.getItem('rentero_theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Přihlášení — Rentero</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="apple-touch-icon" href="/static/favicon.svg">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-0: oklch(0.11 0.015 260);
      --bg-3: oklch(0.22 0.010 260);
      --text-100: oklch(0.90 0.010 260);
      --text-300: oklch(0.40 0.010 260);
      --color-primary: oklch(0.65 0.18 280);
      --border-base: oklch(0.25 0.010 260 / 0.5);
    }
    [data-theme="light"] {
      --bg-0: oklch(0.97 0.005 260);
      --bg-3: oklch(1.00 0.000 0);
      --text-100: oklch(0.15 0.015 260);
      --text-300: oklch(0.65 0.010 260);
      --border-base: oklch(0.85 0.005 260 / 0.5);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      background: var(--bg-0);
      color: var(--text-100);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .login-card {
      background: var(--bg-3);
      border: 1px solid var(--border-base);
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 32px oklch(0 0 0 / 0.5);
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--color-primary);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 4px 16px oklch(0.55 0.18 280 / 0.4);
    }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-300);
      margin-bottom: 5px;
    }
    .form-input {
      width: 100%;
      background: oklch(0.50 0 0 / 0.04);
      border: 1px solid var(--border-base);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 16px; /* prevent iOS auto-zoom on focus */
      color: var(--text-100);
      font-family: inherit;
      transition: border-color 0.13s, box-shadow 0.13s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px oklch(0.55 0.18 280 / 0.15);
    }
    .form-input::placeholder { color: var(--text-300); }
    .btn-submit {
      width: 100%;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.13s, transform 0.13s;
      box-shadow: 0 2px 8px oklch(0.55 0.18 280 / 0.3);
    }
    .btn-submit:hover { filter: brightness(1.1); }
    .btn-submit:active { transform: scale(0.97); }
    .error-box {
      background: oklch(0.65 0.20 20 / 0.1);
      border: 1px solid oklch(0.65 0.20 20 / 0.2);
      border-radius: 7px;
      padding: 10px 12px;
      font-size: 13px;
      color: oklch(0.72 0.16 20);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:20px;font-weight:700;color:var(--text-100);letter-spacing:-0.01em;">Rentero</div>
      <div style="font-size:13px;color:var(--text-300);margin-top:3px;">Správa nemovitostí</div>
    </div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" style="display:flex;flex-direction:column;gap:14px;">
      {{ csrf_input(request) }}
      <div>
        <label class="form-label">Uživatelské jméno</label>
        <input type="text" name="username" autocomplete="username" required class="form-input" autofocus>
      </div>
      <div>
        <label class="form-label">Heslo</label>
        <input type="password" name="password" autocomplete="current-password" required class="form-input">
      </div>
      <button type="submit" class="btn-submit" style="margin-top:4px;">Přihlásit se</button>
    </form>
  </div>
</body>
</html>
