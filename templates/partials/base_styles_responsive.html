<style>
  /* ═══════════════════════════════════════════════════════════════════════
     RESPONSIVE — Mobile, tablet, desktop breakpoints
     Rentero Design System v3
     ═══════════════════════════════════════════════════════════════════════ */

  /* ── Mobile (< 640px) ───────────────────────────────────────────────── */
  @media (max-width: 639px) {
    /* Prevent horizontal overflow / zoom effect */
    html, body { overflow-x: hidden; }

    /* Hide desktop sidebar, show bottom bar */
    .sidebar { display: none; }
    .bottom-bar { display: block; }
    .mobile-month-strip { display: flex; align-items: center; justify-content: center; }

    .main-content {
      margin-left: 0;
      padding: var(--space-lg);
      padding-bottom: calc(var(--bottombar-h) + var(--space-lg));
    }

    /* Prop page header — full width on mobile */
    .prop-page-header {
      margin: calc(-1 * var(--space-lg)) calc(-1 * var(--space-lg)) var(--space-lg);
      padding: var(--space-md) var(--space-lg);
    }
    .prop-page-title { font-size: var(--text-lg); }

    /* KPI cards — 2x2 grid */
    .kpi-grid {
      grid-template-columns: 1fr 1fr !important;
      gap: var(--space-sm) !important;
    }
    .kpi-card { padding: var(--space-md) var(--space-lg); }
    .kpi-value { font-size: var(--text-xl); }
    .kpi-label { font-size: 9px; margin-bottom: var(--space-sm); }

    /* Dashboard prop rows — single flex row on mobile */
    .prop-row {
      display: flex !important;
      flex-direction: row !important;
      align-items: center !important;
      gap: var(--space-sm) !important;
      padding: 11px var(--space-lg) !important;
    }
    .prop-row .pr-name    { flex: 1; min-width: 0; }
    .prop-row .pr-financial { flex-shrink: 0; text-align: right !important; }
    .prop-row .pr-financial > div { justify-content: flex-end; }
    .prop-row .pr-arrow   { flex-shrink: 0; font-size: 14px; }
    .prop-row .pr-hide-mobile { display: none !important; }

    /* Dashboard filter bar — stack on mobile */
    #owner-filter { max-width: 100% !important; width: 100% !important; }
    #card-search  { width: 100% !important; }

    /* Tables → card layout (exclude detail/drilldown expansion rows) */
    .data-table.responsive-cards thead { display: none; }
    .data-table.responsive-cards tbody tr:not(.recon-detail):not(.drilldown-row) {
      display: flex;
      flex-direction: column;
      padding: var(--space-md) var(--space-lg);
      border-bottom: 1px solid var(--border-base);
      gap: var(--space-xs);
    }
    .data-table.responsive-cards tbody tr:not(.recon-detail):not(.drilldown-row) td {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 0;
      border-bottom: none;
      background: none !important;
    }
    .data-table.responsive-cards tbody tr:not(.recon-detail):not(.drilldown-row) td::before {
      content: attr(data-label);
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-300);
      flex-shrink: 0;
      margin-right: var(--space-md);
      min-width: 60px;
      font-family: var(--font-mono);
    }
    /* Hide expand/caret column in card mode */
    .data-table.responsive-cards .recon-arrow-col,
    .data-table.responsive-cards .bank-expand-col { display: none !important; }
    /* Detail rows span full width */
    .data-table.responsive-cards tbody tr.recon-detail,
    .data-table.responsive-cards tbody tr.drilldown-row { display: table-row; }
    .data-table.responsive-cards tbody tr.recon-detail td,
    .data-table.responsive-cards tbody tr.drilldown-row td {
      display: table-cell;
      background: none;
      padding: 0 !important;
    }
    .data-table.responsive-cards tbody tr.recon-detail td::before,
    .data-table.responsive-cards tbody tr.drilldown-row td::before { display: none; }

    /* Filter tabs — scroll horizontal */
    .filter-tabs { overflow-x: auto; flex-wrap: nowrap; }

    /* Res compact strip — stack vertical */
    .res-compact-strip { flex-direction: column; }
    .rcs-group { flex-wrap: wrap; }
    .rcs-right { border-left: none; border-top: 1px solid oklch(1 0 0 / 0.04); }

    /* Floating panel — full width at bottom on mobile */
    .fp-panel {
      position: fixed !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      top: auto !important;
      width: 100% !important;
      min-width: unset !important;
      max-height: 80vh;
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    }

    /* Back to top / copy toast — above bottom bar */
    #back-to-top { bottom: calc(var(--bottombar-h) + var(--space-lg)); }
    #copy-toast   { bottom: calc(var(--bottombar-h) + var(--space-lg)); }

    /* Hide elements marked desktop-only */
    .desktop-only { display: none !important; }

    /* Prevent iOS auto-zoom on input focus */
    .form-input, select.form-input, input.form-input, textarea.form-input {
      font-size: 16px !important;
    }

    /* Filter forms — stack vertically on mobile */
    .card form[style*="display:flex"] {
      flex-direction: column !important;
      align-items: stretch !important;
    }
    .card form[style*="display:flex"] > div { width: 100% !important; }
    .card form[style*="display:flex"] .form-input { width: 100% !important; min-width: unset !important; box-sizing: border-box; }
    .card form[style*="display:flex"] .btn { width: 100%; }

    /* Bank drilldown cards — stack content vertically */
    .drilldown-row td > div > div > div { flex-wrap: wrap; }
    .drilldown-row td [style*="align-items:center;gap:16px"] {
      flex-direction: column !important;
      align-items: flex-start !important;
    }
    .drilldown-row td [style*="text-align:right;flex-shrink:0"] { text-align: left !important; }
    .drilldown-row td [style*="padding:16px 20px 16px 56px"] { padding: 12px 16px 12px 16px !important; }
    .drilldown-row td .btn { width: 100%; justify-content: center; }

    /* Reconciliation detail tables — scroll horizontal */
    .recon-detail td > div { overflow-x: auto; }

    /* Two-column page layouts — stack vertically */
    div[style*="grid-template-columns:1fr 320px"] { grid-template-columns: 1fr !important; }

    /* Page headers with flex — wrap tightly */
    div[style*="justify-content:space-between"] { gap: 8px !important; }

    /* Page titles — smaller on mobile */
    h1[style*="font-size:22px"] { font-size: 18px !important; }

    /* Card 2-column grids — single column on mobile */
    .card div[style*="grid-template-columns:1fr 1fr"] { grid-template-columns: 1fr !important; }

    /* Card padding — tighter on mobile */
    .card div[style*="padding:16px 20px"],
    .card div[style*="padding:14px 20px"] { padding: 12px 14px !important; }

    /* Badge font — slightly larger for touch targets */
    .filter-tab { padding: 6px 14px !important; font-size: 12px !important; }
  }

  /* ── Tablet (640px – 1024px) ────────────────────────────────────────── */
  @media (min-width: 640px) and (max-width: 1024px) {
    .sidebar { width: 60px; overflow: hidden; }
    .sidebar::before { display: none; }
    .sidebar .sidebar-logo div:last-child { display: none; }
    .sidebar .sidebar-section-label { display: none; }
    .sidebar .nav-item span { display: none; }
    .sidebar .nav-item { justify-content: center; padding: 10px; margin: 2px 4px; }
    .sidebar .sb-month-block { display: none; }
    .sidebar #sb-obj-panel { display: none !important; }
    .sidebar #sb-acc-btn span { display: none; }
    .sidebar #sb-acc-btn .caret-icon { display: none; }

    .main-content {
      margin-left: 60px;
      padding: var(--space-xl);
    }

    /* Dashboard rows — tighten on tablet */
    .prop-row { grid-template-columns: 2fr 140px 120px 80px 20px; }

    .kpi-grid { gap: var(--space-sm); }

    /* Two-column page layouts — reduce right column */
    div[style*="grid-template-columns:1fr 320px"] {
      grid-template-columns: 1fr 260px !important;
    }

    /* Form inputs — prevent iOS zoom on tablets too */
    .form-input, select.form-input, input.form-input {
      font-size: 16px !important;
    }
  }

  /* ── Desktop (> 1024px) ─────────────────────────────────────────────── */
  @media (min-width: 1025px) {
    .mobile-only { display: none !important; }
  }

  /* ── Safe area (iPhone notch) ── */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .bottom-bar {
      padding-bottom: env(safe-area-inset-bottom);
      height: calc(var(--bottombar-h) + env(safe-area-inset-bottom));
    }
  }
</style>
