<style>
  /* ═══════════════════════════════════════════════════════════════════════
     LAYOUT — App shell, sidebar, bottom bar, sheet, main content
     ═══════════════════════════════════════════════════════════════════════ */

  .app-layout {
    display: flex;
    min-height: 100vh;
  }

  /* ── Desktop sidebar ────────────────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-0);
    border-right: 1px solid var(--border-base);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 30;
    overflow-y: auto;
    transition: transform var(--duration-normal) var(--ease-out-expo);
  }
  .sidebar-logo {
    padding: 18px var(--space-lg);
    border-bottom: 1px solid var(--border-base);
    display: flex;
    align-items: center;
    gap: var(--space-md);
  }
  .sidebar-logo-icon {
    width: 30px; height: 30px;
    background: var(--color-primary);
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 10px oklch(0.55 0.18 280 / 0.35);
  }
  .sidebar-section-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.13em;
    color: oklch(0.52 0.008 270);
    padding: var(--space-lg) var(--space-md) 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px var(--space-md);
    margin: 0 6px;
    border-radius: 7px;
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--text-200);
    transition: background var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out), border-color var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out), transform 120ms var(--ease-out);
    text-decoration: none;
    border: 1px solid transparent;
    cursor: pointer;
    font-family: inherit;
    background: none;
    width: calc(100% - 12px);
    text-align: left;
    position: relative;
  }
  .nav-item:active { transform: scale(0.97); }
  .nav-item:hover {
    background: oklch(0.50 0 0 / 0.05);
    color: var(--text-100);
    border-color: oklch(0.50 0 0 / 0.05);
  }
  .nav-item.active {
    background: oklch(0.55 0.15 280 / 0.10);
    color: var(--color-primary);
    border-color: oklch(0.55 0.15 280 / 0.18);
    box-shadow: inset 2px 0 0 var(--color-primary), 0 0 12px oklch(0.55 0.18 280 / 0.06);
  }
  .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.55; }
  .nav-item:hover svg, .nav-item.active svg { opacity: 1; }

  /* ── Sidebar month block ── */
  .sb-month-block {
    padding: var(--space-md) var(--space-md);
    border-bottom: 1px solid var(--border-base);
  }
  .sb-month-label {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .1em; color: var(--text-300); margin-bottom: 6px;
  }
  .sb-month-nav { display: flex; align-items: center; gap: 6px; }
  .sb-month-btn {
    background: oklch(0.50 0 0 / 0.04); border: 1px solid var(--border-base);
    border-radius: 5px; color: var(--text-200); cursor: pointer;
    font-size: 17px; line-height: 1; padding: 1px 7px 2px;
    transition: background var(--duration-fast), color var(--duration-fast); font-family: inherit;
  }
  .sb-month-btn:active { transform: scale(0.93); }
  .sb-month-btn:hover { background: oklch(0.50 0 0 / 0.08); color: var(--text-100); }
  .sb-month-val {
    flex: 1; text-align: center; font-size: var(--text-sm); font-weight: 600;
    color: var(--text-100); font-variant-numeric: tabular-nums;
  }

  /* ── Sidebar objects list ── */
  .sb-obj-item {
    display: flex; align-items: center; gap: var(--space-sm);
    padding: 5px var(--space-md) 5px var(--space-xl);
    font-size: 12px; color: var(--text-200); text-decoration: none;
    transition: background var(--duration-fast), color var(--duration-fast), border-color var(--duration-fast); border-radius: 6px; margin: 1px 6px;
    border: 1px solid transparent;
  }
  .sb-obj-item:hover {
    color: var(--text-100);
    background: oklch(0.50 0 0 / 0.04);
    border-color: oklch(0.50 0 0 / 0.05);
  }
  .sb-obj-item.sb-current {
    color: var(--color-primary);
    background: oklch(0.55 0.15 280 / 0.09);
    border-color: transparent;
  }
  .sb-obj-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    background: oklch(0.50 0 0 / 0.18);
    transition: box-shadow var(--duration-normal);
  }
  .sb-obj-dot[data-h="ok"]     { background: var(--color-green);   box-shadow: 0 0 5px oklch(0.70 0.18 155 / 0.55); }
  .sb-obj-dot[data-h="issues"] { background: var(--color-amber);   box-shadow: 0 0 5px oklch(0.75 0.15 75 / 0.55); }
  .sb-obj-dot[data-h="action"] { background: var(--color-primary); box-shadow: 0 0 5px oklch(0.55 0.18 280 / 0.55); }
  .sb-obj-dot[data-h="empty"]  { background: oklch(0.50 0 0 / 0.15); }

  /* ── Main content ── */
  .main-content {
    margin-left: var(--sidebar-w);
    flex: 1;
    background: var(--bg-1);
    min-height: 100vh;
    padding: var(--space-3xl) var(--space-2xl);
  }

  /* ── Property page header ── */
  .prop-page-header {
    position: sticky;
    top: 0;
    z-index: 20;
    margin: calc(-1 * var(--space-3xl)) calc(-1 * var(--space-2xl)) var(--space-xl);
    padding: var(--space-lg) var(--space-2xl) var(--space-lg);
    background: oklch(from var(--bg-1) l c h / 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-base);
  }
  .prop-page-title {
    font-size: var(--text-xl);
    font-weight: 800;
    color: var(--text-100);
    letter-spacing: -0.02em;
  }
  .prop-breadcrumb {
    font-size: var(--text-xs);
    color: var(--text-300);
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: 500;
  }
  .prop-breadcrumb-link {
    color: var(--text-300);
    text-decoration: none;
    transition: color var(--duration-fast);
  }
  .prop-breadcrumb-link:hover { color: var(--text-100); }
  .prop-breadcrumb-sep { opacity: 0.3; }

  /* ── Month navigation ── */
  .month-nav {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    background: oklch(0.50 0 0 / 0.04);
    border: 1px solid var(--border-base);
    border-radius: 9px;
    padding: 3px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .month-nav-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px; height: 26px;
    border-radius: 6px;
    color: var(--text-300);
    text-decoration: none;
    transition: background var(--duration-fast), color var(--duration-fast), transform 120ms var(--ease-out);
    font-size: 15px;
  }
  .month-nav-arrow:active { transform: scale(0.90); }
  .month-nav-arrow:hover {
    background: oklch(0.50 0 0 / 0.08);
    color: var(--text-100);
  }
  .month-nav-label {
    padding: 0 var(--space-md);
    font-size: var(--text-sm);
    font-weight: 700;
    color: var(--text-100);
    font-variant-numeric: tabular-nums;
    min-width: 64px;
    text-align: center;
    background: none; border: none; cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.01em;
  }

  /* ── Section divider ── */
  .section-divider {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    margin: 0 0 var(--space-lg);
  }
  .section-divider-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-300);
    white-space: nowrap;
  }
  .section-divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border-base), transparent);
  }

  /* ── Mobile bottom bar ── */
  .bottom-bar {
    display: none; /* shown via media query in responsive partial */
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--bottombar-h);
    background: oklch(from var(--bg-0) l c h / 0.92);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border-top: 1px solid var(--border-base);
    z-index: 40;
    padding: 0 var(--space-xl);
  }
  .bottom-bar-inner {
    display: flex;
    align-items: center;
    justify-content: space-around;
    height: 100%;
    max-width: 400px;
    margin: 0 auto;
  }
  .bottom-bar-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px var(--space-md);
    color: var(--text-300);
    font-size: 10px;
    font-weight: 500;
    text-decoration: none;
    border: none;
    background: none;
    cursor: pointer;
    font-family: inherit;
    transition: color var(--duration-fast);
    -webkit-tap-highlight-color: transparent;
  }
  .bottom-bar-item svg { width: 22px; height: 22px; }
  .bottom-bar-item.active { color: var(--color-primary); }
  .bottom-bar-item:active { transform: scale(0.92); }

  /* ── Sheet overlay (mobile "Více" menu) ── */
  .sheet-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: oklch(0 0 0 / 0.5);
    z-index: 50;
    opacity: 0;
    transition: opacity var(--duration-slow) var(--ease-out);
  }
  .sheet-backdrop.open {
    display: block;
    opacity: 1;
  }
  .sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-height: 80vh;
    background: var(--bg-2);
    border-top: 1px solid var(--border-top);
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    z-index: 51;
    transform: translate3d(0, 100%, 0);
    transition: transform var(--duration-slow) var(--ease-drawer);
    overflow-y: auto;
    overscroll-behavior: contain;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .sheet.open {
    transform: translate3d(0, 0, 0);
  }
  .sheet-handle {
    width: 36px;
    height: 4px;
    background: oklch(0.50 0 0 / 0.2);
    border-radius: var(--radius-full);
    margin: var(--space-sm) auto var(--space-lg);
  }
  .sheet-nav {
    display: flex;
    flex-direction: column;
    padding: 0 var(--space-lg) var(--space-xl);
    gap: 2px;
  }
  .sheet-nav-item {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    padding: var(--space-md) var(--space-lg);
    border-radius: var(--radius-md);
    font-size: var(--text-base);
    font-weight: 500;
    color: var(--text-200);
    text-decoration: none;
    transition: background var(--duration-fast);
    border: none;
    background: none;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
    text-align: left;
  }
  .sheet-nav-item:active {
    background: oklch(0.50 0 0 / 0.06);
  }
  .sheet-nav-item svg { width: 20px; height: 20px; opacity: 0.5; }
  .sheet-section-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.13em;
    color: var(--text-300);
    padding: var(--space-lg) var(--space-lg) var(--space-sm);
  }
  .sheet-user {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    padding: var(--space-lg);
    border-top: 1px solid var(--border-base);
    margin-top: var(--space-sm);
  }

  /* ── Mobile month nav strip (top of main on mobile) ── */
  .mobile-month-strip {
    display: none; /* shown via media query */
    position: sticky;
    top: 0;
    z-index: 15;
    padding: var(--space-sm) var(--space-lg);
    background: oklch(from var(--bg-1) l c h / 0.9);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border-base);
    margin: calc(-1 * var(--space-lg)) calc(-1 * var(--space-lg)) var(--space-lg);
  }

  /* ── Caret ── */
  .caret-icon { transition: transform var(--duration-normal) var(--ease-out); flex-shrink: 0; color: var(--text-300); }
  .caret-icon.rotated { transform: rotate(-90deg); }
  .collapsed { display: none !important; }

  /* ── Page transition progress bar ── */
  #page-progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 2.5px;
    width: 0%;
    background: linear-gradient(90deg, var(--color-primary), oklch(0.74 0.20 292));
    z-index: 9999;
    opacity: 0;
    border-radius: 0 2px 2px 0;
    box-shadow:
      0 0 10px oklch(0.65 0.18 280 / 0.75),
      0 0 22px oklch(0.65 0.18 280 / 0.40);
    transition: opacity 0.15s, width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
    overflow: visible;
  }
  #page-progress-bar.loading {
    opacity: 1;
    width: 75%;
    transition: opacity 0.1s, width 2s cubic-bezier(0.1, 0.05, 0.1, 1);
  }
  #page-progress-bar.loading::after {
    content: '';
    position: absolute;
    top: 50%; right: -8px;
    transform: translateY(-50%);
    width: 80px; height: 16px;
    background: radial-gradient(ellipse at right center, oklch(0.80 0.18 285 / 0.85), transparent 70%);
    pointer-events: none;
  }
  #page-progress-bar.done {
    opacity: 0;
    width: 100%;
    transition: opacity 0.3s 0.1s, width 0.15s;
  }
  /* Light theme — stronger glow so bar is visible against white */
  [data-theme="light"] #page-progress-bar {
    box-shadow:
      0 0 12px oklch(0.52 0.22 280 / 0.90),
      0 0 28px oklch(0.52 0.20 280 / 0.55),
      0 2px 10px oklch(0.52 0.18 280 / 0.60);
  }
  [data-theme="light"] #page-progress-bar.loading::after {
    background: radial-gradient(ellipse at right center, oklch(0.55 0.22 280 / 0.90), transparent 70%);
  }

  /* ── Objects sheet (mobile) enhanced ── */
  .obj-sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--space-lg) var(--space-md);
  }
  .obj-sheet-title {
    font-size: var(--text-base);
    font-weight: 700;
    color: var(--text-100);
    letter-spacing: -0.01em;
  }
  .obj-sheet-month-badge {
    font-size: var(--text-xs);
    font-weight: 600;
    color: var(--text-300);
    background: oklch(0.50 0 0 / 0.06);
    border: 1px solid var(--border-base);
    border-radius: var(--radius-full);
    padding: 3px 10px;
    font-variant-numeric: tabular-nums;
  }
  .obj-sheet-search-wrap {
    position: relative;
    margin: 0 var(--space-lg) var(--space-md);
  }
  .obj-sheet-search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-300);
    pointer-events: none;
  }
  .obj-sheet-search-input {
    width: 100%;
    background: oklch(0.50 0 0 / 0.06);
    border: 1px solid var(--border-base);
    border-radius: var(--radius-lg);
    padding: 10px 12px 10px 36px;
    font-size: 16px; /* prevent iOS zoom */
    color: var(--text-100);
    font-family: inherit;
    outline: none;
    -webkit-appearance: none;
    transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
  }
  .obj-sheet-search-input:focus {
    border-color: oklch(0.55 0.18 280 / 0.5);
    box-shadow: 0 0 0 3px oklch(0.55 0.18 280 / 0.12);
  }
  .obj-sheet-search-input::placeholder { color: var(--text-300); }
  .obj-sheet-list {
    padding: 0 var(--space-sm) calc(var(--space-xl) + env(safe-area-inset-bottom, 0px));
    overflow-y: auto;
    max-height: 55vh;
  }
  .obj-sheet-loading {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    padding: var(--space-xl) var(--space-md);
    font-size: var(--text-sm);
    color: var(--text-300);
  }
  .obj-sheet-spinner {
    animation: obj-spin 0.9s linear infinite;
    flex-shrink: 0;
  }
  @keyframes obj-spin { to { transform: rotate(360deg); } }
  .obj-sheet-no-results {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-sm);
    padding: var(--space-2xl) var(--space-md);
    font-size: var(--text-sm);
    color: var(--text-300);
  }
  .obj-sheet-no-results svg { opacity: 0.35; }

  /* ── Objects in mobile sheet — bigger touch targets, card style ── */
  #obj-sheet-list .sb-obj-item {
    padding: 11px 14px;
    margin: 2px 0;
    border-radius: var(--radius-md);
    font-size: var(--text-base);
    justify-content: flex-start;
    gap: 12px;
  }
  #obj-sheet-list .sb-obj-dot {
    width: 8px;
    height: 8px;
    flex-shrink: 0;
  }
  #obj-sheet-list .sb-obj-name {
    flex: 1;
    font-weight: 500;
    color: var(--text-200);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #obj-sheet-list .sb-obj-item:hover .sb-obj-name,
  #obj-sheet-list .sb-obj-item.sb-current .sb-obj-name {
    color: var(--text-100);
  }
  #obj-sheet-list .sb-obj-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: var(--radius-full);
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }
  #obj-sheet-list .sb-obj-badge-issues {
    background: oklch(0.75 0.15 75 / 0.15);
    color: var(--color-amber);
    border: 1px solid oklch(0.75 0.15 75 / 0.25);
  }
  #obj-sheet-list .sb-obj-badge-ok {
    background: oklch(0.70 0.18 155 / 0.12);
    color: var(--color-green);
    border: 1px solid oklch(0.70 0.18 155 / 0.2);
  }
  #obj-sheet-list .sb-obj-item.sb-current {
    background: oklch(0.55 0.15 280 / 0.1);
  }
  #obj-sheet-list .sb-obj-item.sb-current .sb-obj-name {
    color: var(--color-primary);
    font-weight: 600;
  }

  /* Desktop sidebar: hide new badge elements (sidebar is compact) */
  #sb-obj-panel .sb-obj-name { flex: 1; }
  #sb-obj-panel .sb-obj-badge { display: none; }
</style>
