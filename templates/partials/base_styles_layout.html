<style>
  /* ═══════════════════════════════════════════════════════════════════════
     LAYOUT — App shell, sidebar, bottom bar, sheet, main content
     Rentero Design System v3 — Dark atmospheric glass
     ═══════════════════════════════════════════════════════════════════════ */

  .app-layout {
    display: flex;
    min-height: 100vh;
  }

  /* ── Cosmic particle canvas ── */
  #cosmos {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
    pointer-events: none;
  }
  [data-theme="light"] #cosmos { display: none; }

  /* ── Desktop sidebar ────────────────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    background: oklch(0.09 0.008 260);
    border-right: 1px solid oklch(1 0 0 / 0.05);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 30;
    overflow-y: auto;
    overflow-x: hidden;
    transition: transform var(--duration-normal) var(--ease-out-expo);
  }

  /* Sidebar ambient glow — very subtle green bleed at top */
  .sidebar::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 120px;
    background: radial-gradient(
      ellipse 100% 80% at 50% -20%,
      oklch(0.65 0.18 280 / 0.04) 0%,
      transparent 70%
    );
    pointer-events: none;
    z-index: 0;
  }

  .sidebar-logo {
    position: relative;
    z-index: 1;
    padding: 20px var(--space-lg);
    border-bottom: 1px solid oklch(1 0 0 / 0.05);
    display: flex;
    align-items: center;
    gap: var(--space-md);
  }
  .sidebar-logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 20px oklch(0.65 0.18 280 / 0.35);
  }
  .sidebar-logo .logo-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-100);
    letter-spacing: -0.02em;
  }
  .sidebar-logo .logo-sub {
    font-size: var(--text-2xs);
    color: var(--text-300);
    font-family: var(--font-mono);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .sidebar-section-label {
    font-size: var(--text-2xs);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-300);
    padding: var(--space-lg) var(--space-lg) 6px;
    font-family: var(--font-mono);
  }

  .nav-item {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px var(--space-lg);
    margin: 1px 8px;
    border-radius: var(--radius-sm);
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--text-200);
    transition:
      background var(--duration-fast) var(--ease-out),
      color var(--duration-fast) var(--ease-out),
      transform var(--duration-instant) var(--ease-out);
    text-decoration: none;
    border: 1px solid transparent;
    cursor: pointer;
    font-family: inherit;
    background: none;
    width: calc(100% - 16px);
    text-align: left;
  }
  .nav-item:active { transform: scale(0.97); }
  @media (hover: hover) and (pointer: fine) {
    .nav-item:hover {
      background: oklch(1 0 0 / 0.04);
      color: var(--text-100);
    }
  }
  .nav-item.active {
    background: oklch(0.65 0.18 280 / 0.08);
    color: var(--accent-text);
    border-color: oklch(0.65 0.18 280 / 0.12);
  }
  /* Active indicator — thin left bar */
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: -1px;
    top: 6px; bottom: 6px;
    width: 2px;
    background: var(--accent);
    border-radius: 1px;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .nav-item svg {
    width: 16px; height: 16px;
    flex-shrink: 0;
    opacity: 0.4;
    stroke-width: 1.5;
  }
  @media (hover: hover) and (pointer: fine) {
    .nav-item:hover svg { opacity: 0.7; }
  }
  .nav-item.active svg { opacity: 1; color: var(--accent); }

  /* ── Sidebar month block ── */
  .sb-month-block {
    padding: var(--space-md);
    border-bottom: 1px solid oklch(1 0 0 / 0.05);
  }
  .sb-month-label {
    font-size: var(--text-2xs); font-weight: 600; text-transform: uppercase;
    letter-spacing: .1em; color: var(--text-300); margin-bottom: 6px;
    font-family: var(--font-mono);
  }
  .sb-month-nav { display: flex; align-items: center; gap: 6px; }
  .sb-month-btn {
    background: oklch(1 0 0 / 0.03); border: 1px solid oklch(1 0 0 / 0.06);
    border-radius: var(--radius-xs); color: var(--text-200); cursor: pointer;
    font-size: 17px; line-height: 1; padding: 1px 7px 2px;
    transition: background var(--duration-fast), color var(--duration-fast), transform var(--duration-instant) var(--ease-out);
    font-family: inherit;
  }
  .sb-month-btn:active { transform: scale(0.93); }
  @media (hover: hover) and (pointer: fine) {
    .sb-month-btn:hover { background: oklch(1 0 0 / 0.06); color: var(--text-100); }
  }
  .sb-month-val {
    flex: 1; text-align: center; font-size: var(--text-sm); font-weight: 600;
    color: var(--text-100); font-family: var(--font-mono); font-variant-numeric: tabular-nums;
  }

  /* ── Sidebar objects list ── */
  .sb-obj-item {
    display: flex; align-items: center; gap: var(--space-sm);
    padding: 5px var(--space-md) 5px var(--space-xl);
    font-size: 12px; color: var(--text-200); text-decoration: none;
    transition: background var(--duration-fast), color var(--duration-fast);
    border-radius: var(--radius-xs); margin: 1px 6px;
    border: 1px solid transparent;
  }
  @media (hover: hover) and (pointer: fine) {
    .sb-obj-item:hover {
      color: var(--text-100);
      background: oklch(1 0 0 / 0.04);
      border-color: oklch(1 0 0 / 0.04);
    }
  }
  .sb-obj-item.sb-current {
    color: var(--accent);
    background: oklch(0.65 0.18 280 / 0.08);
    border-color: transparent;
  }
  .sb-obj-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    background: oklch(1 0 0 / 0.12);
    transition: box-shadow var(--duration-normal);
  }
  .sb-obj-dot[data-h="ok"]     { background: var(--color-green);   box-shadow: 0 0 5px oklch(0.65 0.18 280 / 0.50); }
  .sb-obj-dot[data-h="issues"] { background: var(--color-amber);   box-shadow: 0 0 5px oklch(0.78 0.14 75 / 0.50); }
  .sb-obj-dot[data-h="action"] { background: var(--color-blue);    box-shadow: 0 0 5px oklch(0.68 0.15 250 / 0.50); }
  .sb-obj-dot[data-h="empty"]  { background: oklch(1 0 0 / 0.10); }

  /* ── Main content ── */
  .main-content {
    margin-left: var(--sidebar-w);
    flex: 1;
    background: transparent;
    min-height: 100vh;
    padding: var(--space-3xl) var(--space-2xl);
    position: relative;
    isolation: isolate;
  }

  /* ── Aurora — animated atmospheric gradients ── */
  .main-content::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(ellipse 60% 45%, rgba(80, 35, 150, 0.16) 0%, transparent 70%),
      radial-gradient(ellipse 55% 42%, rgba(25, 55, 155, 0.17) 0%, transparent 65%),
      radial-gradient(ellipse 50% 48%, rgba(170, 80, 25, 0.14) 0%, transparent 62%),
      radial-gradient(ellipse 45% 40%, rgba(15, 100, 140, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse 48% 38%, rgba(140, 50, 80, 0.09) 0%, transparent 65%);
    background-size: 200% 200%;
    background-position:
      80% 10%,
      20% 85%,
      65% 50%,
      30% 80%,
      70% 20%;
    animation: aurora 90s ease-in-out infinite alternate;
  }

  @keyframes aurora {
    0% {
      background-position:
        80% 10%,
        20% 85%,
        65% 50%,
        30% 80%,
        70% 20%;
    }
    25% {
      background-position:
        60% 25%,
        35% 70%,
        80% 35%,
        15% 60%,
        50% 10%;
    }
    50% {
      background-position:
        90% 15%,
        10% 90%,
        45% 60%,
        70% 40%,
        85% 30%;
    }
    75% {
      background-position:
        50% 5%,
        40% 80%,
        70% 45%,
        25% 70%,
        60% 15%;
    }
    100% {
      background-position:
        75% 20%,
        15% 75%,
        55% 55%,
        45% 85%,
        80% 25%;
    }
  }

  /* Light theme — soft purple glow + sun rays */
  [data-theme="light"] .main-content::before {
    background:
      radial-gradient(ellipse 45% 35% at 85% 8%, rgba(160, 120, 220, 0.09) 0%, transparent 60%),
      radial-gradient(ellipse 35% 30% at 10% 80%, rgba(120, 90, 200, 0.05) 0%, transparent 55%);
    background-size: 100% 100%;
    animation: none;
  }

  /* ── Sun rays — light theme only ── */
  .main-content::after {
    content: '';
    position: absolute;
    pointer-events: none;
    z-index: -1;
    display: none;
  }
  [data-theme="light"] .main-content::after {
    display: block;
    inset: 0;
    overflow: hidden;
    background: conic-gradient(
      from 220deg at 95% 5%,
      transparent 0deg,
      rgba(255, 210, 120, 0.12) 6deg,
      transparent 14deg,
      transparent 22deg,
      rgba(255, 195, 90, 0.09) 28deg,
      transparent 36deg,
      transparent 48deg,
      rgba(255, 220, 140, 0.07) 53deg,
      transparent 62deg,
      transparent 76deg,
      rgba(255, 200, 100, 0.10) 81deg,
      transparent 90deg,
      transparent 108deg,
      rgba(255, 185, 80, 0.06) 113deg,
      transparent 122deg,
      transparent 140deg,
      rgba(255, 215, 130, 0.05) 145deg,
      transparent 154deg,
      transparent 175deg,
      rgba(255, 190, 90, 0.04) 180deg,
      transparent 190deg,
      transparent 360deg
    );
    filter: blur(8px);
    animation: sunRays 180s linear infinite;
    mask-image: radial-gradient(ellipse 80% 70% at 90% 10%, black 0%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 90% 10%, black 0%, transparent 70%);
  }

  @keyframes sunRays {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .main-content::before { animation: none; }
    .main-content::after  { animation: none; }
  }

  /* ── Property page header ── */
  .prop-page-header {
    position: sticky;
    top: 0;
    z-index: 20;
    margin: calc(-1 * var(--space-3xl)) calc(-1 * var(--space-2xl)) var(--space-xl);
    padding: var(--space-lg) var(--space-2xl);
    background: oklch(from var(--bg-1) l c h / 0.80);
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    border-bottom: 1px solid var(--border-base);
  }
  .prop-page-title {
    font-size: var(--text-xl);
    font-weight: 800;
    color: var(--text-100);
    letter-spacing: -0.03em;
  }
  .prop-breadcrumb {
    font-size: var(--text-xs);
    color: var(--text-300);
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: 500;
    font-family: var(--font-mono);
  }
  .prop-breadcrumb-link {
    color: var(--text-300);
    text-decoration: none;
    transition: color var(--duration-fast);
  }
  .prop-breadcrumb-link:hover { color: var(--text-100); }
  .prop-breadcrumb-sep { opacity: 0.3; }

  /* ── Month navigation ── */
  .month-nav {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    background: oklch(1 0 0 / 0.03);
    border: 1px solid var(--border-base);
    border-radius: var(--radius-sm);
    padding: 3px;
  }
  .month-nav-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px; height: 28px;
    border-radius: var(--radius-xs);
    color: var(--text-300);
    text-decoration: none;
    transition:
      background var(--duration-fast),
      color var(--duration-fast),
      transform var(--duration-instant) var(--ease-out);
    font-size: 16px;
  }
  .month-nav-arrow:active { transform: scale(0.90); }
  @media (hover: hover) and (pointer: fine) {
    .month-nav-arrow:hover {
      background: oklch(1 0 0 / 0.06);
      color: var(--text-100);
    }
  }
  .month-nav-label {
    padding: 0 var(--space-md);
    font-size: var(--text-sm);
    font-weight: 700;
    color: var(--text-100);
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    min-width: 72px;
    text-align: center;
    background: none; border: none; cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.01em;
  }

  /* ── Section divider ── */
  .section-divider {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    margin: 0 0 var(--space-lg);
  }
  .section-divider-label {
    font-size: var(--text-2xs);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-300);
    white-space: nowrap;
    font-family: var(--font-mono);
  }
  .section-divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, oklch(1 0 0 / 0.06), transparent);
  }

  /* ── Mobile bottom bar ── */
  .bottom-bar {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--bottombar-h);
    background: oklch(from var(--bg-0) l c h / 0.90);
    backdrop-filter: blur(24px) saturate(1.5);
    -webkit-backdrop-filter: blur(24px) saturate(1.5);
    border-top: 1px solid oklch(1 0 0 / 0.06);
    z-index: 40;
    padding: 0 var(--space-xl);
  }
  .bottom-bar-inner {
    display: flex;
    align-items: center;
    justify-content: space-around;
    height: 100%;
    max-width: 400px;
    margin: 0 auto;
  }
  .bottom-bar-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px var(--space-md);
    color: var(--text-300);
    font-size: 10px;
    font-weight: 500;
    text-decoration: none;
    border: none;
    background: none;
    cursor: pointer;
    font-family: inherit;
    transition: color var(--duration-fast);
    -webkit-tap-highlight-color: transparent;
  }
  .bottom-bar-item svg { width: 22px; height: 22px; }
  .bottom-bar-item.active { color: var(--accent); }
  .bottom-bar-item:active { transform: scale(0.92); }

  /* ── Sheet overlay (mobile "Více" menu) ── */
  .sheet-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: oklch(0 0 0 / 0.5);
    z-index: 50;
    opacity: 0;
    transition: opacity var(--duration-normal) var(--ease-out);
  }
  .sheet-backdrop.open {
    display: block;
    opacity: 1;
  }
  .sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-height: 80vh;
    background: var(--bg-2);
    border-top: 1px solid var(--border-top);
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    z-index: 51;
    transform: translate3d(0, 100%, 0);
    transition: transform var(--duration-slow) var(--ease-drawer);
    overflow-y: auto;
    overscroll-behavior: contain;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .sheet.open {
    transform: translate3d(0, 0, 0);
  }
  .sheet-handle {
    width: 36px;
    height: 4px;
    background: oklch(1 0 0 / 0.15);
    border-radius: var(--radius-full);
    margin: var(--space-sm) auto var(--space-lg);
  }
  .sheet-nav {
    display: flex;
    flex-direction: column;
    padding: 0 var(--space-lg) var(--space-xl);
    gap: 2px;
  }
  .sheet-nav-item {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    padding: var(--space-md) var(--space-lg);
    border-radius: var(--radius-md);
    font-size: var(--text-base);
    font-weight: 500;
    color: var(--text-200);
    text-decoration: none;
    transition: background var(--duration-fast);
    border: none;
    background: none;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
    text-align: left;
  }
  .sheet-nav-item:active {
    background: oklch(1 0 0 / 0.04);
  }
  .sheet-nav-item svg { width: 20px; height: 20px; opacity: 0.5; }
  .sheet-section-label {
    font-size: var(--text-2xs);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-300);
    padding: var(--space-lg) var(--space-lg) var(--space-sm);
    font-family: var(--font-mono);
  }
  .sheet-user {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    padding: var(--space-lg);
    border-top: 1px solid var(--border-base);
    margin-top: var(--space-sm);
  }

  /* ── Mobile month nav strip ── */
  .mobile-month-strip {
    display: none;
    position: sticky;
    top: 0;
    z-index: 15;
    padding: var(--space-sm) var(--space-lg);
    background: oklch(from var(--bg-1) l c h / 0.9);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border-base);
    margin: calc(-1 * var(--space-lg)) calc(-1 * var(--space-lg)) var(--space-lg);
  }

  /* ── Caret ── */
  .caret-icon { transition: transform var(--duration-normal) var(--ease-out); flex-shrink: 0; color: var(--text-300); }
  .caret-icon.rotated { transform: rotate(-90deg); }
  .collapsed { display: none !important; }

  /* ── Page transition progress bar ── */
  #page-progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    width: 0%;
    background: var(--accent);
    z-index: 9999;
    opacity: 0;
    border-radius: 0 2px 2px 0;
    box-shadow: 0 0 12px var(--accent-glow);
    transition: opacity var(--duration-fast), width var(--duration-normal) var(--ease-out);
    pointer-events: none;
    overflow: visible;
  }
  #page-progress-bar.loading {
    opacity: 1;
    width: 75%;
    transition: opacity 0.1s, width 2s cubic-bezier(0.1, 0.05, 0.1, 1);
  }
  #page-progress-bar.loading::after {
    content: '';
    position: absolute;
    top: 50%; right: -8px;
    transform: translateY(-50%);
    width: 80px; height: 16px;
    background: radial-gradient(ellipse at right center, oklch(0.65 0.18 280 / 0.60), transparent 70%);
    pointer-events: none;
  }
  #page-progress-bar.done {
    opacity: 0;
    width: 100%;
    transition: opacity 0.3s 0.1s, width 0.15s;
  }
  [data-theme="light"] #page-progress-bar {
    box-shadow: 0 0 12px oklch(0.50 0.18 280 / 0.70);
  }
  [data-theme="light"] #page-progress-bar.loading::after {
    background: radial-gradient(ellipse at right center, oklch(0.50 0.18 280 / 0.70), transparent 70%);
  }

  /* ── Objects sheet (mobile) enhanced ── */
  .obj-sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--space-lg) var(--space-md);
  }
  .obj-sheet-title {
    font-size: var(--text-base);
    font-weight: 700;
    color: var(--text-100);
    letter-spacing: -0.01em;
  }
  .obj-sheet-month-badge {
    font-size: var(--text-xs);
    font-weight: 600;
    color: var(--text-300);
    background: oklch(1 0 0 / 0.04);
    border: 1px solid var(--border-base);
    border-radius: var(--radius-full);
    padding: 3px 10px;
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
  }
  .obj-sheet-search-wrap {
    position: relative;
    margin: 0 var(--space-lg) var(--space-md);
  }
  .obj-sheet-search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-300);
    pointer-events: none;
  }
  .obj-sheet-search-input {
    width: 100%;
    background: oklch(1 0 0 / 0.04);
    border: 1px solid var(--border-base);
    border-radius: var(--radius-lg);
    padding: 10px 12px 10px 36px;
    font-size: 16px;
    color: var(--text-100);
    font-family: inherit;
    outline: none;
    -webkit-appearance: none;
    transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
  }
  .obj-sheet-search-input:focus {
    border-color: oklch(0.65 0.18 280 / 0.40);
    box-shadow: 0 0 0 3px oklch(0.65 0.18 280 / 0.08);
  }
  .obj-sheet-search-input::placeholder { color: var(--text-300); }
  .obj-sheet-list {
    padding: 0 var(--space-sm) calc(var(--space-xl) + env(safe-area-inset-bottom, 0px));
    overflow-y: auto;
    max-height: 55vh;
  }
  .obj-sheet-loading {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    padding: var(--space-xl) var(--space-md);
    font-size: var(--text-sm);
    color: var(--text-300);
  }
  .obj-sheet-spinner {
    animation: spin 0.9s linear infinite;
    flex-shrink: 0;
  }
  .obj-sheet-no-results {
    display: flex;
