<style>
  /* ═══════════════════════════════════════════════════════════════════════
     COMPONENTS — Cards, KPIs, badges, buttons, tables, forms, panels
     Rentero Design System v3 — Dark atmospheric glass
     ═══════════════════════════════════════════════════════════════════════ */

  /* ── Cards ── */
  .card {
    background: var(--bg-3);
    border: 1px solid var(--border-base);
    border-top-color: var(--border-top);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm), var(--glass-highlight);
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-md) var(--space-lg);
    background: oklch(0 0 0 / 0.15);
    border-bottom: 1px solid oklch(1 0 0 / 0.04);
  }
  .card-title {
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--text-100);
    letter-spacing: -0.01em;
  }

  /* ── KPI cards ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: var(--space-md);
    margin-bottom: var(--space-xl);
  }
  .kpi-card {
    background: var(--bg-3);
    border: 1px solid var(--border-base);
    border-radius: var(--radius-md);
    padding: var(--space-lg) var(--space-xl);
    box-shadow: var(--shadow-sm), var(--glass-highlight);
    position: relative;
    overflow: hidden;
    transition:
      border-color var(--duration-fast) var(--ease-out),
      transform var(--duration-fast) var(--ease-out),
      box-shadow var(--duration-fast) var(--ease-out);
  }
  /* Status variants — subtle full-border tint, no colored bars */
  .kpi-card-green   { border-color: oklch(0.72 0.19 155 / 0.18); }
  .kpi-card-blue    { border-color: oklch(0.68 0.15 250 / 0.18); }
  .kpi-card-amber   { border-color: oklch(0.78 0.14 75  / 0.18); }
  .kpi-card-red     { border-color: oklch(0.68 0.20 25  / 0.18); }
  .kpi-card-primary { border-color: oklch(0.65 0.18 280 / 0.18); }
  .kpi-card-neutral { }

  @media (hover: hover) and (pointer: fine) {
    .kpi-card:hover {
      border-color: oklch(1 0 0 / 0.10);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md), var(--glass-highlight);
    }
  }
  .kpi-label {
    font-size: var(--text-2xs);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-300);
    margin-bottom: var(--space-sm);
    font-family: var(--font-mono);
  }
  .kpi-value {
    font-size: var(--text-2xl);
    font-weight: 700;
    color: var(--text-100);
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
    letter-spacing: -0.03em;
    word-spacing: -0.2em;
  }
  .kpi-sub {
    font-size: var(--text-xs);
    margin-top: var(--space-sm);
    color: var(--text-300);
    font-family: var(--font-mono);
  }
  .kpi-delta {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 6px;
    border-radius: var(--radius-full);
    font-size: var(--text-xs);
    font-weight: 700;
    margin-left: var(--space-sm);
    vertical-align: middle;
    font-family: var(--font-mono);
  }
  .kpi-delta-pos { background: var(--green-dim); color: oklch(0.82 0.16 155); border: 1px solid oklch(0.72 0.19 155 / 0.15); }
  .kpi-delta-neg { background: var(--red-dim); color: oklch(0.75 0.18 25); border: 1px solid oklch(0.68 0.20 25 / 0.15); }

  /* ── Badges — simplified: dim bg + colored text + thin border ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: var(--radius-full);
    font-size: var(--text-xs);
    font-weight: 600;
    letter-spacing: 0.02em;
    white-space: nowrap;
    font-family: var(--font-mono);
  }
  .badge-green   { background: var(--green-dim); color: oklch(0.82 0.16 155); border: 1px solid oklch(0.72 0.19 155 / 0.15); }
  .badge-amber   { background: var(--amber-dim); color: var(--color-amber); border: 1px solid oklch(0.78 0.14 75 / 0.15); }
  .badge-red     { background: var(--red-dim);   color: oklch(0.75 0.18 25); border: 1px solid oklch(0.68 0.20 25 / 0.15); }
  .badge-blue    { background: var(--blue-dim);  color: oklch(0.75 0.12 250); border: 1px solid oklch(0.68 0.15 250 / 0.15); }
  .badge-teal    { background: var(--teal-dim);  color: var(--color-teal); border: 1px solid oklch(0.72 0.12 180 / 0.15); }
  .badge-orange  { background: oklch(0.72 0.15 55 / 0.08); color: var(--color-orange); border: 1px solid oklch(0.72 0.15 55 / 0.15); }
  .badge-neutral { background: oklch(1 0 0 / 0.04); color: var(--text-200); border: 1px solid oklch(1 0 0 / 0.06); }
  .badge-primary { background: var(--accent-dim); color: var(--accent-text); border: 1px solid oklch(0.65 0.18 280 / 0.15); }
  .badge-accent  { background: var(--accent-dim); color: var(--accent-text); border: 1px solid oklch(0.65 0.18 280 / 0.15); }

  /* ── Channel badges ── */
  .channel-airbnb  { background: oklch(0.65 0.22 25 / 0.10); color: oklch(0.75 0.14 25); border: 1px solid oklch(0.65 0.22 25 / 0.18); }
  .channel-booking { background: oklch(0.60 0.15 250 / 0.10); color: oklch(0.78 0.08 250); border: 1px solid oklch(0.60 0.15 250 / 0.18); }
  .channel-direct  { background: var(--accent-dim); color: var(--accent-text); border: 1px solid oklch(0.65 0.18 280 / 0.18); }
  .channel-other   { background: oklch(1 0 0 / 0.04); color: var(--text-200); border: 1px solid oklch(1 0 0 / 0.06); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: var(--text-sm);
    font-weight: 500;
    cursor: pointer;
    transition:
      background var(--duration-fast) var(--ease-out),
      color var(--duration-fast) var(--ease-out),
      border-color var(--duration-fast) var(--ease-out),
      box-shadow var(--duration-fast) var(--ease-out),
      transform var(--duration-instant) var(--ease-out);
    border: 1px solid transparent;
    text-decoration: none;
    white-space: nowrap;
    font-family: inherit;
  }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn:active { transform: scale(0.97); }

  /* Primary — solid purple */
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: oklch(1 0 0 / 0.15);
    font-weight: 600;
    box-shadow: 0 1px 4px oklch(0.65 0.18 280 / 0.25);
  }
  @media (hover: hover) and (pointer: fine) {
    .btn-primary:hover {
      background: oklch(0.70 0.16 280);
      box-shadow: 0 4px 16px oklch(0.65 0.18 280 / 0.30);
      transform: translateY(-1px);
    }
  }

  /* Ghost — transparent with border */
  .btn-ghost {
    background: transparent;
    color: var(--text-200);
    border-color: oklch(1 0 0 / 0.08);
  }
  @media (hover: hover) and (pointer: fine) {
    .btn-ghost:hover {
      background: oklch(1 0 0 / 0.04);
      color: var(--text-100);
      border-color: oklch(1 0 0 / 0.12);
    }
  }

  /* Secondary — subtle fill */
  .btn-secondary {
    background: oklch(1 0 0 / 0.04);
    color: var(--text-100);
    border-color: oklch(1 0 0 / 0.06);
  }
  @media (hover: hover) and (pointer: fine) {
    .btn-secondary:hover { background: oklch(1 0 0 / 0.07); border-color: oklch(1 0 0 / 0.10); }
  }

  /* Destructive */
  .btn-destructive {
    background: var(--red-dim);
    color: oklch(0.75 0.18 25);
    border-color: oklch(0.68 0.20 25 / 0.15);
  }
  @media (hover: hover) and (pointer: fine) {
    .btn-destructive:hover {
      background: oklch(0.68 0.20 25 / 0.14);
      box-shadow: 0 4px 12px oklch(0.68 0.20 25 / 0.15);
    }
  }

  /* Danger alias */
  .btn-danger {
    background: oklch(0.68 0.20 25 / 0.10);
    color: oklch(0.75 0.18 25);
    border-color: oklch(0.68 0.20 25 / 0.15);
  }
  @media (hover: hover) and (pointer: fine) {
    .btn-danger:hover { background: oklch(0.68 0.20 25 / 0.16); box-shadow: 0 4px 12px oklch(0.68 0.20 25 / 0.15); }
  }

  /* Success */
  .btn-success {
    background: var(--green-dim);
    color: oklch(0.82 0.16 155);
    border-color: oklch(0.72 0.19 155 / 0.15);
  }
  @media (hover: hover) and (pointer: fine) {
    .btn-success:hover { background: oklch(0.72 0.19 155 / 0.14); box-shadow: 0 4px 12px oklch(0.72 0.19 155 / 0.15); }
  }

  /* Lock */
  .btn-lock {
    background: oklch(1 0 0 / 0.03);
    color: var(--text-300);
    border-color: oklch(1 0 0 / 0.06);
  }
  @media (hover: hover) and (pointer: fine) {
    .btn-lock:hover {
      background: oklch(1 0 0 / 0.06);
      color: var(--text-200);
      border-color: oklch(1 0 0 / 0.10);
    }
  }

  .btn-sm { padding: 5px 12px; font-size: var(--text-xs); border-radius: var(--radius-xs); }
  .btn-icon { padding: 7px 8px; }

  /* ── Data table ── */
  .data-table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
  .data-table th {
    text-align: left;
    padding: 10px var(--space-lg);
    font-size: var(--text-2xs);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-300);
    border-bottom: 1px solid oklch(1 0 0 / 0.06);
    background: oklch(1 0 0 / 0.02);
    white-space: nowrap;
    font-family: var(--font-mono);
  }
  .data-table th.text-right  { text-align: right; }
  .data-table th.text-center { text-align: center; }
  .data-table td {
    padding: 11px var(--space-lg);
    border-bottom: 1px solid oklch(1 0 0 / 0.04);
    color: var(--text-200);
    vertical-align: middle;
    transition:
      background var(--duration-fast) var(--ease-out),
      color var(--duration-fast) var(--ease-out);
  }
  .data-table tbody tr:nth-child(odd) td { background: oklch(1 0 0 / 0.015); }
  @media (hover: hover) and (pointer: fine) {
    .data-table tbody tr:hover td {
      background: oklch(1 0 0 / 0.04);
      color: var(--text-100);
    }
  }
  .data-table tbody tr:last-child td { border-bottom: none; }
  .data-table tfoot td {
    padding: 11px var(--space-lg);
    border-top: 1px solid oklch(1 0 0 / 0.06);
    color: var(--text-100);
    background: oklch(0 0 0 / 0.18);
    font-weight: 600;
  }

  /* Numeric cells — always mono */
  .num {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--text-200);
    letter-spacing: -0.02em;
  }
  .num-pos    { color: var(--accent); }
  .num-neg    { color: var(--color-red); }
  .num-strong { color: var(--text-100); font-weight: 600; }

  /* ── Filter tabs ── */
  .filter-tabs {
    display: flex;
    align-items: center;
    gap: 2px;
    background: oklch(1 0 0 / 0.02);
    border: 1px solid var(--border-base);
    border-radius: var(--radius-sm);
    padding: 3px;
  }
  .filter-tab {
    padding: 5px 12px;
    border-radius: var(--radius-xs);
    font-size: var(--text-xs);
    font-weight: 500;
    color: var(--text-300);
    cursor: pointer;
    transition:
      background var(--duration-fast) var(--ease-out),
      color var(--duration-fast) var(--ease-out),
      transform var(--duration-instant) var(--ease-out);
    border: 1px solid transparent;
    background: none;
    font-family: inherit;
    text-decoration: none;
    white-space: nowrap;
  }
  .filter-tab:active { transform: scale(0.97); }
  @media (hover: hover) and (pointer: fine) {
    .filter-tab:hover { color: var(--text-200); background: oklch(1 0 0 / 0.04); }
  }
  .filter-tab.active {
    background: oklch(1 0 0 / 0.06);
    color: var(--text-100);
    border-color: oklch(1 0 0 / 0.06);
  }

  /* ── Form inputs ── */
  .form-input {
    width: 100%;
    background: oklch(0 0 0 / 0.25);
    border: 1px solid oklch(1 0 0 / 0.06);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: var(--text-sm);
    color: var(--text-100);
    font-family: inherit;
    transition:
      border-color var(--duration-fast) var(--ease-out),
      box-shadow var(--duration-fast) var(--ease-out);
  }
  .form-input:focus {
    outline: none;
    border-color: oklch(0.65 0.18 280 / 0.40);
    box-shadow: 0 0 0 3px oklch(0.65 0.18 280 / 0.08);
    background: oklch(0 0 0 / 0.35);
  }
  .form-input::placeholder { color: var(--text-300); }
  select.form-input option { background: var(--bg-3); }
  .form-label {
    display: block;
    font-size: var(--text-2xs);
    font-weight: 600;
    color: var(--text-300);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: var(--font-mono);
  }

  /* ── Notifications — simplified: flat dim bg + border ── */
  .notify {
    border-radius: var(--radius-sm);
    padding: var(--space-md) var(--space-lg);
    font-size: var(--text-sm);
    display: flex;
    align-items: flex-start;
    gap: var(--space-md);
    margin-bottom: var(--space-md);
    border: 1px solid;
  }
  .notify [data-dismiss-banner],
  .notify-dismiss {
    margin-left: auto;
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-xs);
    border: 1px solid oklch(1 0 0 / 0.06);
    background: oklch(1 0 0 / 0.03);
    color: inherit;
    opacity: 0.72;
    cursor: pointer;
    transition: opacity var(--duration-fast), background var(--duration-fast);
    font-size: 16px;
    line-height: 1;
    padding: 0;
  }
  .notify [data-dismiss-banner]:hover,
  .notify-dismiss:hover {
    opacity: 1;
    background: oklch(1 0 0 / 0.06);
  }
  .notify-info    { background: var(--blue-dim);  border-color: oklch(0.68 0.15 250 / 0.12); color: oklch(0.75 0.12 250); }
  .notify-error   { background: var(--red-dim);   border-color: oklch(0.68 0.20 25 / 0.12);  color: oklch(0.75 0.18 25); }
  .notify-success { background: var(--green-dim); border-color: oklch(0.72 0.19 155 / 0.12); color: oklch(0.82 0.16 155); }
  .notify-amber   { background: var(--amber-dim); border-color: oklch(0.78 0.14 75 / 0.12);  color: var(--color-amber); }

  /* ── Progress bar ── */
  .prop-bar      { height: 3px; border-radius: 2px; background: var(--border-base); overflow: hidden; margin-top: 5px; }
  .prop-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s var(--ease-out); }

  /* ── Override badge ── */
  .override-badge {
    display: inline-block;
    padding: 1px 5px;
    border-radius: var(--radius-xs);
    font-size: var(--text-2xs);
    font-weight: 700;
    background: var(--amber-dim);
    color: var(--color-amber);
    border: 1px solid oklch(0.78 0.14 75 / 0.15);
    vertical-align: middle;
    margin-left: 4px;
    font-family: var(--font-mono);
  }

  /* ── Meta chip ── */
  .meta-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: var(--radius-xs);
    font-size: var(--text-xs);
    font-weight: 500;
    background: oklch(1 0 0 / 0.04);
    border: 1px solid var(--border-base);
    color: var(--text-200);
  }
  .meta-chip .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* ── Property rows (dashboard) ── */
  .prop-row {
    display: grid;
    grid-template-columns: 2fr 160px 140px 100px 24px;
    align-items: center;
    gap: var(--space-md);
    padding: var(--space-md) var(--space-lg);
    background: var(--bg-3);
    border: 1px solid var(--border-base);
    border-radius: var(--radius-md);
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    margin-bottom: var(--space-sm);
    transition:
      background var(--duration-fast) var(--ease-out),
      border-color var(--duration-fast) var(--ease-out),
      box-shadow var(--duration-fast) var(--ease-out),
      transform 120ms var(--ease-out);
    box-shadow: var(--glass-highlight);
  }
  .prop-row:active { transform: scale(0.99); }
  @media (hover: hover) and (pointer: fine) {
    .prop-row:hover {
      background: var(--bg-4);
      border-color: oklch(1 0 0 / 0.12);
      box-shadow: var(--shadow-sm), var(--glass-highlight-strong);
      transform: translateY(-1px);
    }
  }

  /* Health states — full border color, no left bar */
  .prop-row[data-health="ok"]      { border-color: oklch(0.72 0.19 155 / 0.18); }
  .prop-row[data-health="issues"]  { border-color: oklch(0.78 0.14 75  / 0.30); }
  .prop-row[data-health="action"]  { border-color: oklch(0.68 0.15 250 / 0.20); }
  .prop-row[data-has-new="true"]   { border-color: oklch(0.72 0.12 180 / 0.25); }
  .prop-row[data-locked="true"]    { opacity: 0.40; }

  .pr-name { display: flex; align-items: center; gap: var(--space-sm); min-width: 0; }
  /* Status dot — small circle before property name */
  .pr-name::before {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--text-300);
  }
  .prop-row[data-health="ok"]     .pr-name::before { background: var(--color-green); }
  .prop-row[data-health="issues"] .pr-name::before { background: var(--color-amber); }
  .prop-row[data-health="action"] .pr-name::before { background: var(--color-blue); }
  .prop-row[data-has-new="true"]  .pr-name::before { background: var(--color-teal); }
  .prop-row[data-locked="true"]   .pr-name::before { background: var(--text-300); opacity: 0.5; }

  .pr-title {
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--text-100);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .pr-slug {
    font-size: var(--text-xs);
    color: var(--text-300);
    margin-top: 1px;
    font-family: var(--font-mono);
  }

  /* ── Trend sparkline + reservation count ── */
  .pr-trend { display: flex; align-items: center; gap: var(--space-sm); }
  .pr-spark { width: 72px; height: 28px; flex-shrink: 0; }
  .pr-rez { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; }
  .pr-rez-num {
    font-size: var(--text-base); font-weight: 700; color: var(--text-100);
    font-family: var(--font-mono); font-variant-numeric: tabular-nums; line-height: 1.2;
  }
  .pr-rez-lbl { font-size: var(--text-2xs); color: var(--text-300); line-height: 1; }
  .pr-rez-delta {
    font-size: var(--text-2xs); font-weight: 600;
    font-family: var(--font-mono); font-variant-numeric: tabular-nums; line-height: 1;
  }
  .pr-rez-up   { color: var(--color-green); }
  .pr-rez-down { color: var(--color-red); }

  /* Financial column */
  .pr-financial {
    text-align: right;
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
  }

  .pr-stats { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .pr-arrow {
    color: var(--text-300);
    font-size: 18px;
    text-align: right;
    transition:
      color var(--duration-fast) var(--ease-out),
      transform var(--duration-fast) var(--ease-out);
  }
  @media (hover: hover) and (pointer: fine) {
    .prop-row:hover .pr-arrow {
      color: var(--text-200);
      transform: translateX(2px);
    }
  }

  /* ── Table sorting ── */
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text-100); }
  th.sorted  { color: var(--accent); }
  .sort-ind  { font-size: var(--text-2xs); opacity: .7; margin-left: 2px; }
  th.dragging    { opacity: .35; }
  th.drop-target { background: var(--accent-dim); }
  .col-drag {
    cursor: grab; opacity: 0; font-size: var(--text-xs); margin-left: 4px;
    color: var(--text-300); transition: opacity var(--duration-fast); display: inline-block;
  }
  th:hover .col-drag { opacity: 1; }
  tr.row-selected td { background: var(--accent-dim) !important; }
  tr.row-expand-active td { background: transparent !important; }
  tr.res-expand-row td { padding: 0 !important; }

  /* ── Compact inline expand strip ── */
  .res-compact-strip {
    display: flex;
    align-items: stretch;
    background: oklch(1 0 0 / 0.015);
    border-bottom: 1px solid oklch(1 0 0 / 0.04);
    min-height: 48px;
  }
  .rcs-group {
    display: flex;
    align-items: stretch;
    flex: 1;
  }
  .rcs-item {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    gap: 3px;
    flex: 1;
    padding: 0 16px;
    min-width: 80px;
  }
  .rcs-sep {
    width: 1px;
    background: oklch(1 0 0 / 0.04);
    flex-shrink: 0;
    margin: 11px 0;
  }
  .rcs-right {
    display: flex;
    align-items: stretch;
    flex: 0 0 auto;
    border-left: 1px solid oklch(1 0 0 / 0.04);
  }
  .rcs-right .rcs-item { align-items: flex-end; min-width: 100px; }
  .rcs-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-300);
    white-space: nowrap;
    font-family: var(--font-mono);
  }
  .rcs-val {
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--text-100);
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    line-height: 1.15;
    letter-spacing: -0.01em;
    border-radius: 3px;
    transition: background var(--duration-fast);
  }
  .rcs-val[data-copy] {
    cursor: pointer;
    padding: 1px 4px;
    margin: -1px -4px;
  }
  .rcs-val[data-copy]:hover {
    background: oklch(1 0 0 / 0.05);
  }
  .rcs-val-strong { color: var(--text-100); font-size: var(--text-base); }
  .rcs-val-sub    { color: var(--text-200); font-weight: 500; font-size: 12px; }
  .rcs-val-muted  { color: var(--text-300); font-weight: 500; font-size: 11.5px; }
  .rcs-val-ok     { color: var(--color-green); }
  .rcs-val-bad    { color: var(--color-red); }
  .rcs-sub-date   { font-size: var(--text-2xs); opacity: 0.65; margin-left: 5px; font-weight: 400; }

  /* ── Table reset button ── */
  .tbl-reset-btn {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: var(--text-xs); font-family: inherit;
    color: var(--text-300); background: transparent;
    border: 1px solid var(--border-base); border-radius: var(--radius-xs);
    padding: 3px 8px; cursor: pointer;
    transition: color var(--duration-fast), border-color var(--duration-fast), background var(--duration-fast);
    margin-left: 8px;
  }
  @media (hover: hover) and (pointer: fine) {
    .tbl-reset-btn:hover { color: var(--text-100); border-color: oklch(1 0 0 / 0.12); background: oklch(1 0 0 / 0.03); }
  }

  /* ── Copy toast ── */
  #copy-toast {
    position: fixed; bottom: 74px; right: 28px; z-index: 300;
    background: var(--bg-3);
    border: 1px solid oklch(0.65 0.18 280 / 0.20);
    border-radius: var(--radius-sm);
    padding: 7px 13px;
    font-size: var(--text-xs); font-weight: 500;
    color: var(--accent-text);
    box-shadow: var(--shadow-md);
    opacity: 0; pointer-events: none;
    transform: translateY(8px) scale(0.95);
    transition:
      opacity var(--duration-normal) var(--ease-out),
      transform var(--duration-normal) var(--ease-out);
  }
  #copy-toast.show {
    opacity: 1; pointer-events: auto;
    transform: translateY(0) scale(1);
  }

  /* ── Scroll-to-top button ── */
  #back-to-top {
    position: fixed; bottom: 28px; right: 28px; z-index: 200;
    width: 36px; height: 36px;
    background: var(--bg-3);
    border: 1px solid var(--border-base);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-300);
    box-shadow: var(--shadow-md);
    opacity: 0; pointer-events: none;
    transform: translateY(8px) scale(0.95);
    transition:
      opacity var(--duration-normal) var(--ease-out),
      transform var(--duration-normal) var(--ease-out),
      background var(--duration-fast),
      color var(--duration-fast),
      border-color var(--duration-fast);
  }
  #back-to-top.visible {
    opacity: 1; pointer-events: auto;
    transform: translateY(0) scale(1);
  }
  @media (hover: hover) and (pointer: fine) {
    #back-to-top:hover { background: var(--bg-4); color: var(--text-100); border-color: oklch(1 0 0 / 0.10); }
  }

  /* ── Floating Panel ── */
  .fp-panel {
    position: fixed;
    z-index: 1000;
    background: oklch(from var(--bg-2) l c h / 0.88);
    border: 1px solid oklch(1 0 0 / 0.08);
    border-top-color: oklch(1 0 0 / 0.12);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-xl), 0 0 0 0.5px oklch(0 0 0 / 0.5);
    display: flex;
    flex-direction: column;
    min-width: 360px;
    min-height: 140px;
    overflow: visible;
    transition:
      box-shadow var(--duration-fast),
      opacity var(--duration-normal) var(--ease-out);
    user-select: none;
    backdrop-filter: blur(40px) saturate(1.3);
    -webkit-backdrop-filter: blur(40px) saturate(1.3);
  }
  .fp-panel.fp-dragging {
    box-shadow: 0 36px 70px oklch(0 0 0 / 0.75), 0 14px 36px oklch(0 0 0 / 0.5), 0 0 0 0.5px oklch(0 0 0 / 0.8);
    opacity: 0.94;
  }
  .fp-panel.fp-resizing { transition: none; }
  .fp-panel.fp-minimized .fp-content,
  .fp-panel.fp-minimized .fp-edge { display: none !important; }
  .fp-panel.fp-minimized { border-radius: var(--radius-md); }

  /* Edge resize handles */
  .fp-edge { position: absolute; z-index: 2; }
  .fp-edge-n  { top: -4px;    left: 10px;  right: 10px; height: 8px; cursor: n-resize; }
  .fp-edge-s  { bottom: -4px; left: 10px;  right: 10px; height: 8px; cursor: s-resize; }
  .fp-edge-e  { top: 10px;    right: -4px; bottom: 10px; width: 8px; cursor: e-resize; }
  .fp-edge-w  { top: 10px;    left: -4px;  bottom: 10px; width: 8px; cursor: w-resize; }
  .fp-edge-nw { top: -4px;    left: -4px;  width: 14px; height: 14px; cursor: nw-resize; }
  .fp-edge-ne { top: -4px;    right: -4px; width: 14px; height: 14px; cursor: ne-resize; }
  .fp-edge-sw { bottom: -4px; left: -4px;  width: 14px; height: 14px; cursor: sw-resize; }
  .fp-edge-se { bottom: -4px; right: -4px; width: 14px; height: 14px; cursor: se-resize; }

  /* Tab bar */
  .fp-tabbar {
    display: flex;
    align-items: center;
    background: oklch(0 0 0 / 0.30);
    border-bottom: 1px solid oklch(1 0 0 / 0.05);
    border-radius: var(--radius-md) var(--radius-md) 0 0;
    min-height: 38px;
    overflow: hidden;
    flex-shrink: 0;
    cursor: grab;
  }
  .fp-tabbar:active { cursor: grabbing; }
  .fp-panel.fp-minimized .fp-tabbar { border-radius: var(--radius-md); border-bottom: none; }
  .fp-tabs-scroll {
    display: flex;
    align-items: center;
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    padding-left: 2px;
  }
  .fp-tabs-scroll::-webkit-scrollbar { display: none; }
  .fp-tab {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0 12px;
    height: 38px;
    background: none;
    border: none;
    border-right: 1px solid oklch(1 0 0 / 0.04);
    color: var(--text-300);
    font-size: var(--text-xs);
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background var(--duration-fast), color var(--duration-fast);
    position: relative;
  }
  .fp-tab:hover { background: oklch(1 0 0 / 0.04); color: var(--text-200); }
  .fp-tab.fp-tab-active {
    background: oklch(1 0 0 / 0.06);
    color: var(--text-100);
  }
  /* Active indicator — green bottom bar */
  .fp-tab.fp-tab-active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
  }
  .fp-tab-summary {
    padding: 0 12px;
    font-size: var(--text-sm);
    font-weight: 700;
    border-right: none;
    border-left: 1px solid oklch(1 0 0 / 0.04);
    margin-left: auto;
    flex-shrink: 0;
    letter-spacing: 0.02em;
    color: var(--text-300);
    font-family: var(--font-mono);
  }
  .fp-tab-summary.fp-tab-active { color: var(--text-100); }
  .fp-tab-summary.fp-tab-active::after {
    background: var(--color-amber);
  }
  .fp-tab-dot {
    width: 7px; height: 7px; border-radius: 50%;
    flex-shrink: 0; box-shadow: 0 0 6px currentColor;
  }
  .fp-tab-dot.dot-airbnb { background: oklch(0.65 0.22 25); color: oklch(0.65 0.22 25); }
  .fp-tab-dot.dot-booking { background: oklch(0.60 0.15 250); color: oklch(0.60 0.15 250); }
  .fp-tab-dot.dot-other { background: oklch(1 0 0 / 0.20); color: transparent; box-shadow: none; }
  .fp-tab-label { max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
  .fp-tab-close {
    margin-left: 2px;
    opacity: 0;
    font-size: 14px;
    line-height: 1;
    transition: opacity var(--duration-fast);
    padding: 2px;
    border-radius: var(--radius-xs);
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
  }
  .fp-tab:hover .fp-tab-close { opacity: 0.4; }
  .fp-tab-close:hover { opacity: 0.9 !important; background: oklch(1 0 0 / 0.06); }

  /* Window controls */
  .fp-controls {
    display: flex;
    align-items: center;
    padding: 0 4px;
    gap: 1px;
    flex-shrink: 0;
    border-left: 1px solid oklch(1 0 0 / 0.04);
    align-self: stretch;
  }
  .fp-btn {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    color: var(--text-300);
    cursor: pointer;
    border-radius: var(--radius-xs);
    transition: background var(--duration-fast), color var(--duration-fast);
  }
  .fp-btn:hover { background: oklch(1 0 0 / 0.06); color: var(--text-100); }
  .fp-btn-close:hover { background: oklch(0.55 0.22 25 / 0.85); color: #fff; }

  /* Content area */
  .fp-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0;
    user-select: text;
    border-radius: 0 0 var(--radius-md) var(--radius-md);
  }
  .fp-content::-webkit-scrollbar { width: 5px; }
  .fp-content::-webkit-scrollbar-track { background: transparent; }
  .fp-content::-webkit-scrollbar-thumb { background: oklch(1 0 0 / 0.08); border-radius: 3px; }
  .fp-content::-webkit-scrollbar-thumb:hover { background: oklch(1 0 0 / 0.15); }
  .fp-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    height: 120px;
    color: var(--text-300);
    font-size: var(--text-sm);
  }
  .fp-spinner { animation: spin 0.8s linear infinite; }

  /* Summary tab */
  .fp-summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: var(--space-lg);
  }
  .fp-summary-item {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 12px 14px;
    background: oklch(1 0 0 / 0.03);
    border: 1px solid oklch(1 0 0 / 0.06);
    border-radius: var(--radius-sm);
    transition: border-color var(--duration-fast);
  }
  .fp-summary-item:hover { border-color: oklch(1 0 0 / 0.10); }
  .fp-summary-item.fp-summary-featured {
    grid-column: 1 / -1;
    background: var(--accent-dim);
    border-color: oklch(0.65 0.18 280 / 0.15);
  }
  .fp-summary-label {
    font-size: var(--text-2xs);
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-300);
    font-family: var(--font-mono);
  }
  .fp-summary-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-100);
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .fp-summary-featured .fp-summary-value {
    font-size: 22px;
    color: var(--accent);
  }
  .fp-summary-item-sm .fp-summary-value { font-size: 22px; }
  .fp-summary-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100px;
    color: var(--text-300);
    font-size: var(--text-sm);
  }
  .fp-summary-breakdown {
    margin: 0 var(--space-lg) var(--space-lg);
    font-size: 12px;
    border-collapse: collapse;
    width: calc(100% - 32px);
  }
  .fp-summary-breakdown th,
  .fp-summary-breakdown td {
    padding: 5px 8px;
    text-align: left;
    border-bottom: 1px solid oklch(1 0 0 / 0.04);
    color: var(--text-300);
    font-family: var(--font-mono);
  }
  .fp-summary-breakdown th {
    color: var(--text-300);
    font-weight: 600;
    font-size: var(--text-2xs);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .fp-summary-breakdown td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--text-200);
  }

  /* ── Excluded rows ── */
  .row-excluded { opacity: 0.45; }
  .row-excluded .num-strong { text-decoration: line-through; }

  /* ── Adjustment sub-label ── */
  .adjustment-sublabel {
    display: block;
    font-size: var(--text-2xs);
    color: var(--text-300);
    margin-top: 2px;
    white-space: nowrap;
  }

  /* ═══════════════════════════════════════════════════════════════════
     RESERVATION DETAIL — Floating panel content
     ═══════════════════════════════════════════════════════════════════ */
  .drawer-header {
    padding: 18px 20px 16px;
    border-bottom: 1px solid var(--border-base);
  }
  .drawer-header-airbnb  { background: oklch(0.65 0.22 25 / 0.06); }
  .drawer-header-booking { background: oklch(0.60 0.15 250 / 0.06); }
  .drawer-header-other   { background: oklch(1 0 0 / 0.03); }
  .drawer-header-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 10px; margin-bottom: 10px;
  }
  .drawer-header-meta-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .drawer-guest-name {
    font-size: var(--text-lg); font-weight: 800; color: var(--text-100);
    line-height: 1.25; letter-spacing: -0.01em;
  }
  .drawer-stay-label {
    font-size: 12px; color: var(--text-300);
    margin-top: 3px; font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-weight: 500;
  }
  .drawer-meta-item {
    display: flex; align-items: center; gap: 4px;
    font-size: var(--text-xs); color: var(--text-300); font-weight: 500;
  }
  .drawer-code {
    font-size: var(--text-xs); color: var(--text-300);
    font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: 0.03em; font-weight: 500;
  }
  .drawer-txn-total {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px;
    background: var(--bg-2);
    border-radius: var(--radius-xs); border: 1px solid var(--border-base);
  }
  .drawer-section {
    padding: var(--space-lg) 18px;
    border-bottom: 1px solid var(--border-base);
  }
  .drawer-section:last-child { border-bottom: none; }
  .drawer-section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: var(--space-md);
  }
  .drawer-section-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--text-300);
    font-family: var(--font-mono);
  }
  .drawer-section-note {
    font-size: var(--text-2xs);
    color: var(--text-300);
    font-weight: 400;
  }
  .drawer-metric-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .drawer-metric {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 10px 12px;
    background: var(--bg-2);
    border: 1px solid var(--border-base);
    border-radius: var(--radius-sm);
    transition: border-color var(--duration-fast);
  }
  .drawer-metric:hover { border-color: oklch(1 0 0 / 0.10); }
  .drawer-metric-label {
    font-size: var(--text-2xs);
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-300);
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: var(--font-mono);
  }
  .drawer-metric-value {
    font-size: var(--text-base);
    font-weight: 600;
    color: var(--text-100);
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .drawer-metric-value-strong {
    font-size: var(--text-xl);
    font-weight: 700;
    color: var(--text-100);
    font-family: var(--font-mono);
    letter-spacing: -0.02em;
  }
  .drawer-metric-sub {
    font-size: var(--text-2xs);
    color: var(--text-300);
    margin-top: 1px;
  }
  .drawer-status {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 7px 11px;
    border-radius: var(--radius-sm);
    font-size: var(--text-xs);
    font-weight: 600;
  }
  .drawer-status-ok {
    background: var(--green-dim);
    border: 1px solid oklch(0.72 0.19 155 / 0.15);
    color: oklch(0.82 0.16 155);
  }
  .drawer-status-warn {
    background: var(--amber-dim);
    border: 1px solid oklch(0.78 0.14 75 / 0.15);
    color: var(--color-amber);
  }
  .drawer-formula { display: flex; flex-direction: column; gap: 8px; }
  .drawer-anchor {
    background: var(--accent-dim);
    border: 1px solid oklch(0.65 0.18 280 / 0.15);
    border-radius: var(--radius-sm);
    padding: 13px 15px;
  }
  .drawer-anchor-label {
    font-size: 9px;
    color: oklch(0.65 0.18 280 / 0.50);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    margin-bottom: 5px;
    font-family: var(--font-mono);
  }
  .drawer-anchor-row { display: flex; align-items: baseline; gap: 10px; }
  .drawer-anchor-value {
    font-size: 22px;
    font-weight: 800;
    color: var(--text-100);
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .drawer-anchor-note { font-size: var(--text-xs); color: var(--text-300); }
  .drawer-inline-note {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: var(--text-xs);
    color: var(--text-300);
    padding: 3px 2px;
  }
  .drawer-inline-note svg { width: 12px; height: 12px; flex-shrink: 0; }
  .drawer-flow-block {
    background: var(--bg-2);
    border: 1px solid var(--border-base);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .drawer-flow-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 13px;
    border-bottom: 1px solid var(--border-base);
    gap: 8px;
  }
  .drawer-flow-row:last-child { border-bottom: none; }
  .drawer-flow-label { font-size: 12px; color: var(--text-200); font-weight: 400; }
  .drawer-flow-label-dim { color: var(--text-300); font-size: var(--text-xs); }
  .drawer-flow-value {
    font-size: 12px; color: var(--text-200);
    font-family: var(--font-mono); font-variant-numeric: tabular-nums; white-space: nowrap; font-weight: 500;
  }
  .drawer-flow-value-dim { color: var(--text-300); font-weight: 400; }
  .drawer-flow-total {
    background: var(--accent-dim);
    border-top: 1px solid oklch(0.65 0.18 280 / 0.12) !important;
  }
  .drawer-flow-total .drawer-flow-label { font-weight: 700; color: var(--text-100); font-size: var(--text-sm); }
  .drawer-flow-total .drawer-flow-value { font-weight: 800; font-size: 15px; color: var(--accent-text); letter-spacing: -0.01em; }

  /* ── Theme toggle button ── */
  .theme-toggle-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: calc(100% - 16px);
    margin: 0 8px;
    padding: 7px 12px;
    background: none;
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--text-300);
    cursor: pointer;
    font-family: inherit;
    text-align: left;
