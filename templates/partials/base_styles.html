<style>
  /* ═══════════════════════════════════════════════════════════════════════
     ROOT VARIABLES — Dark SaaS Pro design system
     ═══════════════════════════════════════════════════════════════════════ */
  :root {
    /* ── Background depth scale (cool indigo-navy) ── */
    --bg-0:      #060810;
    --bg-1:      #090b17;
    --bg-2:      #0d1020;
    --bg-3:      #131729;
    --bg-4:      #181c32;

    /* ── Shadow scale (softer, no inset white lift) ── */
    --shadow-sm: 0 1px 4px rgba(0,0,0,.35);
    --shadow-md: 0 4px 18px rgba(0,0,0,.45);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.6);

    /* ── Border pattern (softer) ── */
    --border-base:   rgba(255,255,255,0.06);
    --border-top:    rgba(255,255,255,0.10);
    --border-active: rgba(124,109,255,0.4);

    /* ── Colors ── */
    --color-primary: #8b7dff;
    --color-green:   #22c55e;
    --color-amber:   #f59e0b;
    --color-red:     #f43f5e;
    --color-blue:    #3b82f6;
    --color-teal:    #2dd4bf;
    --color-orange:  #fb923c;

    /* ── Text (softer, cooler tone) ── */
    --text-100: #dde6f5;
    --text-200: #7888a0;
    --text-300: #38415e;

    /* ── Legacy aliases ── */
    --bg-root:         var(--bg-1);
    --bg-panel:        var(--bg-2);
    --bg-card:         var(--bg-3);
    --bg-card-hover:   var(--bg-4);
    --border-subtle:   var(--border-base);
    --bg:              var(--bg-1);
    --surface:         var(--bg-3);
    --surface-raised:  var(--bg-4);
    --text-primary:    var(--text-100);
    --text-secondary:  var(--text-200);
    --text-muted:      var(--text-300);
    --border:          var(--border-base);
    --green:           var(--color-green);
    --green-dim:       rgba(34,197,94,0.12);
    --red:             var(--color-red);
    --red-dim:         rgba(244,63,94,0.12);
    --amber:           var(--color-amber);
    --amber-dim:       rgba(245,158,11,0.12);
    --blue:            var(--color-blue);
    --blue-dim:        rgba(59,130,246,0.12);
    --accent:          var(--color-primary);
    --accent-hover:    #8b7dff;
    --accent-dim:      rgba(124,109,255,0.12);
    --accent-text:     #b0a4ff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg-0);
    color: var(--text-100);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }
  .num { font-variant-numeric: tabular-nums; }

  .app-layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    background: var(--bg-0);
    border-right: 1px solid var(--border-base);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 30;
    overflow-y: auto;
  }
  .sidebar-logo {
    padding: 18px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sidebar-logo-icon {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, #8b7dff, #6355e8);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(100,85,255,0.35);
  }
  .sidebar-section-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.13em;
    color: rgba(255,255,255,0.3);
    padding: 16px 12px 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 12px;
    margin: 0 6px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.42);
    transition: all 0.13s ease;
    text-decoration: none;
    border: 1px solid transparent;
    cursor: pointer;
    font-family: inherit;
    background: none;
    width: calc(100% - 12px);
    text-align: left;
    position: relative;
  }
  .nav-item:hover {
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.78);
    border-color: rgba(255,255,255,0.05);
  }
  .nav-item.active {
    background: rgba(124,109,255,0.09);
    color: #b0a4ff;
    border-color: transparent;
    border-left-color: var(--color-primary);
  }
  .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.5; }
  .nav-item:hover svg, .nav-item.active svg { opacity: 1; }

  .main-content {
    margin-left: 220px;
    flex: 1;
    background:
      radial-gradient(ellipse 80% 45% at 65% -5%, rgba(80,60,220,0.07) 0%, transparent 60%),
      var(--bg-1);
    min-height: 100vh;
    padding: 28px 32px;
  }

  .card {
    background: var(--bg-3);
    border: 1px solid var(--border-base);
    border-top-color: var(--border-top);
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 20px;
    background: rgba(0,0,0,0.08);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-100);
    letter-spacing: 0.01em;
  }

  .kpi-card {
    background: var(--bg-3);
    border: 1px solid var(--border-base);
    border-top-color: var(--border-top);
    border-radius: 14px;
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 14px 14px 0 0;
  }
  /* color strip + downward glow — one clean indicator per card */
  .kpi-card-green::before   {
    background: linear-gradient(90deg, var(--color-green), #4ade80);
    box-shadow: 0 0 16px 2px rgba(34,197,94,0.3);
  }
  .kpi-card-blue::before    {
    background: linear-gradient(90deg, var(--color-blue), #60a5fa);
    box-shadow: 0 0 16px 2px rgba(59,130,246,0.3);
  }
  .kpi-card-amber::before   {
    background: linear-gradient(90deg, var(--color-amber), #fbbf24);
    box-shadow: 0 0 16px 2px rgba(245,158,11,0.3);
  }
  .kpi-card-red::before     {
    background: linear-gradient(90deg, var(--color-red), #fb7185);
    box-shadow: 0 0 16px 2px rgba(244,63,94,0.3);
  }
  .kpi-card-primary::before {
    background: linear-gradient(90deg, var(--color-primary), #a99aff);
    box-shadow: 0 0 16px 2px rgba(139,125,255,0.3);
  }
  .kpi-card-neutral::before {
    background: linear-gradient(90deg, rgba(255,255,255,0.2), rgba(255,255,255,0.08));
    box-shadow: 0 0 10px 1px rgba(255,255,255,0.08);
  }
  .kpi-card:hover {
    box-shadow: var(--shadow-md);
    border-color: rgba(255,255,255,0.10);
    transform: translateY(-1px);
  }
  .kpi-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.42);
    margin-bottom: 10px;
  }
  .kpi-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-100);
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .kpi-sub {
    font-size: 12px;
    margin-top: 8px;
    color: rgba(255,255,255,0.38);
  }
  .kpi-delta {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 7px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    margin-left: 8px;
    vertical-align: middle;
  }
  .kpi-delta-pos { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
  .kpi-delta-neg { background: rgba(244,63,94,0.15); color: #fb7185; border: 1px solid rgba(244,63,94,0.2); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .badge-green   { background: rgba(34,197,94,0.13);   color: #4ade80;              border: 1px solid rgba(34,197,94,0.25);  border-top-color: rgba(34,197,94,0.35); }
  .badge-amber   { background: rgba(245,158,11,0.13);  color: #fbbf24;              border: 1px solid rgba(245,158,11,0.25); border-top-color: rgba(245,158,11,0.38); }
  .badge-red     { background: rgba(244,63,94,0.13);   color: #fb7185;              border: 1px solid rgba(244,63,94,0.25);  border-top-color: rgba(244,63,94,0.38); }
  .badge-blue    { background: rgba(59,130,246,0.13);  color: #60a5fa;              border: 1px solid rgba(59,130,246,0.25); border-top-color: rgba(59,130,246,0.38); }
  .badge-teal    { background: rgba(45,212,191,0.13);  color: var(--color-teal);    border: 1px solid rgba(45,212,191,0.25); border-top-color: rgba(45,212,191,0.38); }
  .badge-orange  { background: rgba(251,146,60,0.13);  color: var(--color-orange);  border: 1px solid rgba(251,146,60,0.25); border-top-color: rgba(251,146,60,0.38); }
  .badge-neutral { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.1); }
  .badge-primary { background: rgba(124,109,255,0.14); color: #a99aff;              border: 1px solid rgba(124,109,255,0.25); border-top-color: rgba(124,109,255,0.38); }
  .badge-accent  { background: rgba(124,109,255,0.14); color: #a99aff;              border: 1px solid rgba(124,109,255,0.25); border-top-color: rgba(124,109,255,0.38); }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(45,212,191,0.4); }
    70%  { box-shadow: 0 0 0 6px rgba(45,212,191,0); }
    100% { box-shadow: 0 0 0 0 rgba(45,212,191,0); }
  }
  .badge-teal.pulse { animation: pulse-ring 2s ease-out infinite; }

  .channel-airbnb  { background: linear-gradient(135deg, rgba(255,90,95,0.18), rgba(255,90,95,0.08));  color: #ff9295; border: 1px solid rgba(255,90,95,0.3);  border-top-color: rgba(255,90,95,0.45); }
  .channel-booking { background: linear-gradient(135deg, rgba(79,142,247,0.18), rgba(79,142,247,0.08)); color: #93c5fd; border: 1px solid rgba(79,142,247,0.3); border-top-color: rgba(79,142,247,0.45); }
  .channel-direct  { background: linear-gradient(135deg, rgba(124,109,255,0.18), rgba(124,109,255,0.08)); color: #a99aff; border: 1px solid rgba(124,109,255,0.3); border-top-color: rgba(124,109,255,0.45); }
  .channel-other   { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.1); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
    text-decoration: none;
    white-space: nowrap;
    font-family: inherit;
  }
  .btn:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; }
  .btn-primary {
    background: linear-gradient(135deg, #8b7dff 0%, #6a5ef5 100%);
    color: #fff;
    border-color: rgba(255,255,255,0.12);
    box-shadow: 0 2px 10px rgba(100,85,255,0.3);
    font-weight: 600;
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #9d91ff 0%, #7c70ff 100%);
    box-shadow: 0 4px 16px rgba(100,85,255,0.4);
    transform: translateY(-1px);
  }
  .btn-ghost {
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.5);
    border-color: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .btn-ghost:hover {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.8);
    border-color: rgba(255,255,255,0.13);
  }
  .btn-destructive {
    background: rgba(244,63,94,0.08);
    color: #fb7185;
    border-color: rgba(244,63,94,0.2);
    border-top-color: rgba(244,63,94,0.3);
  }
  .btn-destructive:hover {
    background: rgba(244,63,94,0.15);
    box-shadow: 0 4px 12px rgba(244,63,94,0.2);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.06);
    color: var(--text-100);
    border-color: rgba(255,255,255,0.09);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.13); }
  .btn-danger {
    background: rgba(244,63,94,0.12);
    color: #fb7185;
    border-color: rgba(244,63,94,0.22);
    border-top-color: rgba(244,63,94,0.32);
  }
  .btn-danger:hover { background: rgba(244,63,94,0.2); box-shadow: 0 4px 12px rgba(244,63,94,0.2); }
  .btn-success {
    background: rgba(34,197,94,0.12);
    color: #4ade80;
    border-color: rgba(34,197,94,0.22);
    border-top-color: rgba(34,197,94,0.32);
  }
  .btn-success:hover { background: rgba(34,197,94,0.2); box-shadow: 0 4px 12px rgba(34,197,94,0.2); }
  .btn-lock {
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.38);
    border-color: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .btn-lock:hover {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.72);
    border-color: rgba(255,255,255,0.13);
  }
  .btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 6px; }
  .btn-icon { padding: 7px 8px; }

  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th {
    text-align: left;
    padding: 10px 16px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.1);
    white-space: nowrap;
  }
  .data-table th.text-right  { text-align: right; }
  .data-table th.text-center { text-align: center; }
  .data-table td {
    padding: 11px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--text-200);
    vertical-align: middle;
    transition: background 0.1s, color 0.1s;
  }
  .data-table tbody tr:nth-child(odd) td { background: rgba(255,255,255,0.012); }
  .data-table tbody tr:hover td {
    background: rgba(255,255,255,0.05);
    color: var(--text-100);
  }
  .data-table tbody tr:hover td:first-child {
    box-shadow: inset 2px 0 0 var(--color-primary);
  }
  .data-table tbody tr:last-child td { border-bottom: none; }
  .data-table tfoot td {
    padding: 11px 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
    color: var(--text-100);
    background: rgba(0,0,0,0.18);
    font-weight: 600;
  }
  .num { font-variant-numeric: tabular-nums; font-size: 12.5px; font-weight: 500; color: var(--text-200); }
  .num-pos    { color: var(--color-green); }
  .num-neg    { color: var(--color-red); }
  .num-strong { color: var(--text-100); font-weight: 600; }

  .filter-tabs {
    display: flex;
    align-items: center;
    gap: 2px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-base);
    border-radius: 9px;
    padding: 3px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .filter-tab {
    padding: 4px 11px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.13s;
    border: 1px solid transparent;
    background: none;
    font-family: inherit;
    text-decoration: none;
    white-space: nowrap;
  }
  .filter-tab:hover { color: rgba(255,255,255,0.65); background: rgba(255,255,255,0.05); }
  .filter-tab.active {
    background: rgba(255,255,255,0.07);
    color: var(--text-100);
    border-color: rgba(255,255,255,0.08);
    box-shadow: none;
  }

  .form-input {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.09);
    border-top-color: rgba(255,255,255,0.06);
    border-radius: 7px;
    padding: 7px 10px;
    font-size: 13px;
    color: var(--text-100);
    font-family: inherit;
    transition: border-color 0.13s, box-shadow 0.13s;
  }
  .form-input:focus {
    outline: none;
    border-color: rgba(124,109,255,0.6);
    box-shadow: 0 0 0 3px rgba(124,109,255,0.18);
    background: rgba(0,0,0,0.4);
  }
  .form-input::placeholder { color: rgba(255,255,255,0.2); }
  select.form-input option { background: var(--bg-3); }
  .form-label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,0.35);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .notify {
    border-radius: 9px;
    padding: 10px 14px;
    font-size: 13px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
  }
  .notify [data-dismiss-banner],
  .notify-dismiss {
    margin-left: auto;
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: inherit;
    opacity: 0.72;
    cursor: pointer;
    transition: opacity 0.12s, background 0.12s, border-color 0.12s;
    font-size: 16px;
    line-height: 1;
    padding: 0;
  }
  .notify [data-dismiss-banner]:hover,
  .notify-dismiss:hover {
    opacity: 1;
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.14);
  }
  .notify [data-dismiss-banner]:focus-visible,
  .notify-dismiss:focus-visible {
    outline: 2px solid rgba(255,255,255,0.2);
    outline-offset: 2px;
  }
  .notify-info    { background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(59,130,246,0.05));  border: 1px solid rgba(59,130,246,0.22);  border-top-color: rgba(59,130,246,0.35); color: #60a5fa; }
  .notify-error   { background: linear-gradient(135deg, rgba(244,63,94,0.12), rgba(244,63,94,0.05));   border: 1px solid rgba(244,63,94,0.22);   border-top-color: rgba(244,63,94,0.35);  color: #fb7185; }
  .notify-success { background: linear-gradient(135deg, rgba(34,197,94,0.12), rgba(34,197,94,0.05));   border: 1px solid rgba(34,197,94,0.22);   border-top-color: rgba(34,197,94,0.35);  color: #4ade80; }
  .notify-amber   { background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.05)); border: 1px solid rgba(245,158,11,0.22);  border-top-color: rgba(245,158,11,0.35); color: #fbbf24; }

  .prop-bar      { height: 3px; border-radius: 2px; background: var(--border-subtle); overflow: hidden; margin-top: 5px; }
  .prop-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

  .override-badge {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    background: rgba(245,158,11,0.12);
    color: var(--color-amber);
    border: 1px solid rgba(245,158,11,0.22);
    vertical-align: middle;
    margin-left: 4px;
  }

  .meta-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 500;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border-subtle);
    color: var(--text-200);
  }
  .meta-chip .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  .caret-icon { transition: transform 0.2s ease; flex-shrink: 0; color: var(--text-300); }
  .caret-icon.rotated { transform: rotate(-90deg); }
  .collapsed { display: none !important; }
  details > summary { list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
  a { color: inherit; text-decoration: none; }
  code {
    font-family: 'SF Mono', 'Fira Code', monospace;
    background: rgba(255,255,255,0.06);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
  }



  /* ─── Property page sticky header ───────────────────────────────── */
  .prop-page-header {
    position: sticky;
    top: 0;
    z-index: 20;
    margin: -28px -32px 24px;
    padding: 16px 32px 14px;
    background: rgba(9,11,23,0.82);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .prop-page-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--text-100);
    letter-spacing: -0.02em;
  }
  .prop-breadcrumb {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: 500;
  }
  .prop-breadcrumb-link {
    color: rgba(255,255,255,0.35);
    text-decoration: none;
    transition: color 0.13s;
  }
  .prop-breadcrumb-link:hover { color: rgba(255,255,255,0.7); }
  .prop-breadcrumb-sep { opacity: 0.3; }

  /* ─── Month navigation ───────────────────────────────────────────── */
  .month-nav {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-base);
    border-radius: 9px;
    padding: 3px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .month-nav-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 26px;
    border-radius: 6px;
    color: rgba(255,255,255,0.3);
    text-decoration: none;
    transition: all 0.13s;
    font-size: 15px;
  }
  .month-nav-arrow:hover {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.85);
  }
  .month-nav-label {
    padding: 0 12px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-100);
    font-variant-numeric: tabular-nums;
    min-width: 64px;
    text-align: center;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.01em;
  }

  /* ─── Dashboard section divider ──────────────────────────────────── */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 16px;
  }
  .section-divider-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.25);
    white-space: nowrap;
  }
  .section-divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0.06), transparent);
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .animate-spin { animation: spin 1.2s linear infinite; }

  .sb-month-block {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .sb-month-label {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .1em; color: var(--text-300); margin-bottom: 6px;
  }
  .sb-month-nav { display: flex; align-items: center; gap: 6px; }
  .sb-month-btn {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border-subtle);
    border-radius: 5px; color: var(--text-200); cursor: pointer;
    font-size: 17px; line-height: 1; padding: 1px 7px 2px;
    transition: all .12s; font-family: inherit;
  }
  .sb-month-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-100); }
  .sb-month-val {
    flex: 1; text-align: center; font-size: 13px; font-weight: 600;
    color: var(--text-100); font-variant-numeric: tabular-nums;
  }

  .sb-obj-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 12px 5px 24px;
    font-size: 12px; color: rgba(255,255,255,0.38); text-decoration: none;
    transition: all .13s; border-radius: 6px; margin: 1px 6px;
    border: 1px solid transparent;
  }
  .sb-obj-item:hover {
    color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,.04);
    border-color: rgba(255,255,255,.05);
  }
  .sb-obj-item.sb-current {
    color: #b0a4ff;
    background: rgba(124,109,255,0.09);
    border-color: transparent;
    border-left-color: rgba(139,125,255,0.5);
  }
  .sb-obj-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255,255,255,0.18);
    transition: box-shadow 0.2s;
  }
  .sb-obj-dot[data-h="ok"]     { background: var(--color-green);   box-shadow: 0 0 5px rgba(34,197,94,0.55); }
  .sb-obj-dot[data-h="issues"] { background: var(--color-amber);   box-shadow: 0 0 5px rgba(245,158,11,0.55); }
  .sb-obj-dot[data-h="action"] { background: var(--color-primary); box-shadow: 0 0 5px rgba(139,125,255,0.55); }
  .sb-obj-dot[data-h="empty"]  { background: rgba(255,255,255,0.15); }
  .sb-obj-item.sb-current .sb-obj-dot[data-h="ok"]     { box-shadow: 0 0 7px rgba(34,197,94,0.7); }
  .sb-obj-item.sb-current .sb-obj-dot[data-h="issues"] { box-shadow: 0 0 7px rgba(245,158,11,0.7); }
  .sb-obj-item.sb-current .sb-obj-dot[data-h="empty"]  { background: var(--color-primary); box-shadow: 0 0 7px rgba(139,125,255,0.7); }

  .prop-row {
    display: grid;
    grid-template-columns: 2fr 140px 120px 80px 20px;
    align-items: center; gap: 16px;
    padding: 12px 16px;
    background: var(--bg-3);
    border: 1px solid var(--border-base);
    border-top-color: var(--border-top);
    border-radius: 10px; cursor: pointer; text-decoration: none;
    transition: background .15s, box-shadow .15s, border-color .15s, transform .15s;
    box-shadow: none;
    margin-bottom: 5px; color: inherit;
  }
  .prop-row:hover {
    background: var(--bg-4);
    border-color: rgba(255,255,255,.09);
    box-shadow: var(--shadow-sm), inset 2px 0 0 rgba(139,125,255,0.5);
    transform: translateY(-1px);
  }
  .prop-row:hover .pr-arrow { color: rgba(255,255,255,0.55); }
  .prop-row[data-health="issues"] { border-left: 2px solid var(--color-amber); }
  .prop-row[data-has-new="true"]  { border-left: 2px solid var(--color-teal); }
  .prop-row[data-locked="true"] { opacity: .5; }
  .pr-name { display: flex; align-items: center; gap: 9px; min-width: 0; }
  .pr-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: rgba(255,255,255,0.18); }
  .pr-dot[data-h="ok"]     { background: var(--color-green);   box-shadow: 0 0 5px rgba(34,197,94,0.55); }
  .pr-dot[data-h="issues"] { background: var(--color-amber);   box-shadow: 0 0 5px rgba(245,158,11,0.55); }
  .pr-dot[data-h="action"] { background: var(--color-primary); box-shadow: 0 0 5px rgba(139,125,255,0.55); }
  .pr-title { font-size: 13px; font-weight: 600; color: var(--text-100);
              overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pr-slug  { font-size: 11px; color: var(--text-300); margin-top: 1px; }
  .pr-occ   { display: flex; flex-direction: column; gap: 3px; }
  .pr-bar   { height: 3px; background: var(--border-subtle); border-radius: 2px; overflow: hidden; }
  .pr-bar-fill { height: 100%; background: var(--color-primary); border-radius: 2px; transition: width .4s; }
  .pr-occ-lbl  { font-size: 11px; color: var(--text-300); }
  .pr-stats, .pr-issues { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .pr-arrow { color: var(--text-300); font-size: 16px; text-align: right; }

  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text-100); }
  th.sorted  { color: var(--color-primary); }
  .sort-ind  { font-size: 10px; opacity: .7; margin-left: 2px; }
  th.dragging    { opacity: .35; }
  th.drop-target { background: rgba(124,109,255,.08); }
  .col-drag {
    cursor: grab; opacity: 0; font-size: 11px; margin-left: 4px;
    color: var(--text-300); transition: opacity .1s; display: inline-block;
  }
  th:hover .col-drag { opacity: 1; }
  tr.row-selected td { background: rgba(124,109,255,.06) !important; }
  tr.row-expand-active td { background: transparent !important; }
  tr.res-expand-row td { padding: 0 !important; }

  /* ── Compact inline expand strip ─────────────────────────────────── */
  .res-compact-strip {
    display: flex;
    align-items: stretch;
    background: rgba(255,255,255,0.018);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    min-height: 48px;
  }
  /* each group grows to fill available space */
  .rcs-group {
    display: flex;
    align-items: stretch;
    flex: 1;
  }
  /* each item inside group also grows equally */
  .rcs-item {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    gap: 3px;
    flex: 1;
    padding: 0 16px;
    min-width: 80px;
  }
  /* thin vertical divider between groups */
  .rcs-sep {
    width: 1px;
    background: rgba(255,255,255,0.05);
    flex-shrink: 0;
    margin: 11px 0;
  }
  /* right block: fixed, no grow */
  .rcs-right {
    display: flex;
    align-items: stretch;
    flex: 0 0 auto;
    border-left: 1px solid rgba(255,255,255,0.05);
  }
  .rcs-right .rcs-item { align-items: flex-end; min-width: 100px; }
  .rcs-right .rcs-sep  { margin: 11px 0; }
  .rcs-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-300);
    white-space: nowrap;
  }
  .rcs-val {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-100);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    line-height: 1.15;
    border-radius: 3px;
    transition: background 0.1s;
  }
  .rcs-val[data-copy] {
    cursor: pointer;
    padding: 1px 4px;
    margin: -1px -4px;
  }
  .rcs-val[data-copy]:hover {
    background: rgba(255,255,255,0.07);
  }
  .rcs-val-strong { color: var(--text-100); font-size: 13.5px; }
  .rcs-val-sub    { color: var(--text-200); font-weight: 500; font-size: 12px; }
  .rcs-val-muted  { color: var(--text-300); font-weight: 500; font-size: 11.5px; }
  .rcs-val-ok     { color: var(--color-green); }
  .rcs-val-bad    { color: var(--color-red); }
  .rcs-sub-date   { font-size: 10px; opacity: 0.65; margin-left: 5px; font-weight: 400; }

  @keyframes rowIn { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:none} }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tbl-reset-btn {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-family: inherit;
    color: var(--text-300); background: transparent;
    border: 1px solid var(--border-subtle); border-radius: 5px;
    padding: 3px 8px; cursor: pointer; transition: all .13s;
    margin-left: 8px;
  }
  .tbl-reset-btn:hover { color: var(--text-100); border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }

  /* ── Click-to-copy ── */
  td.copyable { cursor: copy; position: relative; }
  td.copyable:hover { color: var(--text-100); }
  td.copy-flash { animation: copyFlash .4s ease forwards; }
  @keyframes copyFlash {
    0%   { background: rgba(124,109,255,.18); }
    100% { background: transparent; }
  }
  #copy-toast {
    position: fixed; bottom: 74px; right: 28px; z-index: 300;
    background: var(--bg-card);
    border: 1px solid rgba(124,109,255,.3);
    border-radius: 8px;
    padding: 7px 13px;
    font-size: 12px; font-weight: 500;
    color: var(--color-primary);
    box-shadow: 0 4px 16px rgba(0,0,0,.35);
    opacity: 0; pointer-events: none;
    transform: translateY(6px);
    transition: opacity .15s ease, transform .15s ease;
  }
  #copy-toast.show { opacity: 1; transform: translateY(0); }

  /* ── Scroll-to-top button ── */
  #back-to-top {
    position: fixed; bottom: 28px; right: 28px; z-index: 200;
    width: 36px; height: 36px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-300);
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    opacity: 0; pointer-events: none;
    transform: translateY(8px);
    transition: opacity .2s ease, transform .2s ease, background .13s, color .13s, border-color .13s;
  }
  #back-to-top.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
  #back-to-top:hover { background: var(--bg-card-hover); color: var(--text-100); border-color: rgba(255,255,255,0.12); }

  /* ─── Floating Panel ──────────────────────────────────────────────── */
  .fp-panel {
    position: fixed;
    z-index: 1000;
    background: rgba(13,16,30,0.92);
    border: 1px solid rgba(255,255,255,0.09);
    border-top-color: rgba(255,255,255,0.14);
    border-radius: 10px;
    box-shadow:
      0 20px 50px rgba(0,0,0,.65),
      0 6px 18px rgba(0,0,0,.4),
      0 0 0 0.5px rgba(0,0,0,.8);
    display: flex;
    flex-direction: column;
    min-width: 360px;
    min-height: 140px;
    overflow: visible;
    transition: box-shadow 0.2s, opacity 0.15s;
    user-select: none;
    backdrop-filter: blur(32px) saturate(1.3);
    -webkit-backdrop-filter: blur(32px) saturate(1.3);
  }
  .fp-panel.fp-dragging {
    box-shadow:
      0 36px 70px rgba(0,0,0,.75),
      0 14px 36px rgba(0,0,0,.5),
      0 0 0 0.5px rgba(0,0,0,.8);
    opacity: 0.94;
  }
  .fp-panel.fp-resizing {
    transition: none;
  }
  .fp-panel.fp-minimized .fp-content,
  .fp-panel.fp-minimized .fp-edge {
    display: none !important;
  }
  .fp-panel.fp-minimized {
    border-radius: 10px;
  }

  /* ── Edge / corner resize handles ────────────────────────────────── */
  .fp-edge {
    position: absolute;
    z-index: 2;
  }
  .fp-edge-n  { top: -4px;    left: 10px;  right: 10px; height: 8px; cursor: n-resize; }
  .fp-edge-s  { bottom: -4px; left: 10px;  right: 10px; height: 8px; cursor: s-resize; }
  .fp-edge-e  { top: 10px;    right: -4px; bottom: 10px; width: 8px; cursor: e-resize; }
  .fp-edge-w  { top: 10px;    left: -4px;  bottom: 10px; width: 8px; cursor: w-resize; }
  .fp-edge-nw { top: -4px;    left: -4px;  width: 14px; height: 14px; cursor: nw-resize; }
  .fp-edge-ne { top: -4px;    right: -4px; width: 14px; height: 14px; cursor: ne-resize; }
  .fp-edge-sw { bottom: -4px; left: -4px;  width: 14px; height: 14px; cursor: sw-resize; }
  .fp-edge-se { bottom: -4px; right: -4px; width: 14px; height: 14px; cursor: se-resize; }

  /* ── Tab bar / title bar ─────────────────────────────────────────── */
  .fp-tabbar {
    display: flex;
    align-items: center;
    background: rgba(0,0,0,0.35);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px 10px 0 0;
    min-height: 36px;
    overflow: hidden;
    flex-shrink: 0;
    cursor: grab;
  }
  .fp-tabbar:active { cursor: grabbing; }
  .fp-panel.fp-minimized .fp-tabbar {
    border-radius: 10px;
    border-bottom: none;
  }
  .fp-tabs-scroll {
    display: flex;
    align-items: center;
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    padding-left: 2px;
  }
  .fp-tabs-scroll::-webkit-scrollbar { display: none; }
  .fp-tab {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0 10px;
    height: 36px;
    background: none;
    border: none;
    border-right: 1px solid rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.38);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
    position: relative;
  }
  .fp-tab:hover {
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.7);
  }
  .fp-tab.fp-tab-active {
    background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
    color: #f1f5f9;
  }
  .fp-tab.fp-tab-active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--color-primary), #a99aff);
    border-radius: 2px 2px 0 0;
  }
  .fp-tab-summary {
    padding: 0 12px;
    font-size: 13px;
    font-weight: 700;
    border-right: none;
    border-left: 1px solid rgba(255,255,255,0.06);
    margin-left: auto;
    flex-shrink: 0;
    letter-spacing: 0.02em;
    color: rgba(255,255,255,0.45);
  }
  .fp-tab-summary.fp-tab-active { color: #f1f5f9; }
  .fp-tab-summary.fp-tab-active::after {
    background: linear-gradient(90deg, var(--color-amber), #fbbf24);
  }
  .fp-tab-dot {
    width: 7px; height: 7px; border-radius: 50%;
    flex-shrink: 0; box-shadow: 0 0 6px currentColor;
  }
  .fp-tab-dot.dot-airbnb { background: #ff5a5f; color: #ff5a5f; }
  .fp-tab-dot.dot-booking { background: #4f8ef7; color: #4f8ef7; }
  .fp-tab-dot.dot-other { background: rgba(255,255,255,0.3); color: transparent; box-shadow: none; }
  .fp-tab-label {
    max-width: 110px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .fp-tab-close {
    margin-left: 2px;
    opacity: 0;
    font-size: 14px;
    line-height: 1;
    transition: opacity 0.12s;
    padding: 2px;
    border-radius: 4px;
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
  }
  .fp-tab:hover .fp-tab-close { opacity: 0.4; }
  .fp-tab-close:hover { opacity: 0.9 !important; background: rgba(255,255,255,0.08); }

  /* ── Window controls ─────────────────────────────────────────────── */
  .fp-controls {
    display: flex;
    align-items: center;
    padding: 0 4px;
    gap: 1px;
    flex-shrink: 0;
    border-left: 1px solid rgba(255,255,255,0.06);
    align-self: stretch;
  }
  .fp-btn {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    color: rgba(255,255,255,0.35);
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.13s, color 0.13s;
  }
  .fp-btn:hover {
    background: rgba(255,255,255,0.09);
    color: rgba(255,255,255,0.85);
  }
  .fp-btn-close:hover {
    background: rgba(232,65,65,0.85);
    color: #fff;
  }

  /* ── Content area ────────────────────────────────────────────────── */
  .fp-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0;
    user-select: text;
    border-radius: 0 0 10px 10px;
  }
  .fp-content::-webkit-scrollbar { width: 5px; }
  .fp-content::-webkit-scrollbar-track { background: transparent; }
  .fp-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  .fp-content::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
  .fp-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    height: 120px;
    color: rgba(255,255,255,0.25);
    font-size: 13px;
  }
  .fp-spinner { animation: spin 0.8s linear infinite; }

  /* ─── Summary tab ─────────────────────────────────────────────────── */
  .fp-summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 16px;
  }
  .fp-summary-item {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 12px 14px;
    background: linear-gradient(145deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.025) 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-top-color: rgba(255,255,255,0.12);
    border-radius: 10px;
    transition: border-color 0.15s;
  }
  .fp-summary-item:hover { border-color: rgba(255,255,255,0.14); }
  .fp-summary-item.fp-summary-featured {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, rgba(34,197,94,0.12) 0%, rgba(34,197,94,0.04) 100%);
    border-color: rgba(34,197,94,0.2);
    border-top-color: rgba(34,197,94,0.3);
  }
  .fp-summary-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }
  .fp-summary-value {
    font-size: 18px;
    font-weight: 700;
    color: #f1f5f9;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .fp-summary-featured .fp-summary-value {
    font-size: 22px;
    color: var(--color-green);
  }
  .fp-summary-item-sm .fp-summary-value { font-size: 22px; }
  .fp-summary-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100px;
    color: rgba(255,255,255,0.2);
    font-size: 13px;
  }
  .fp-summary-breakdown {
    margin: 0 16px 16px;
    font-size: 12px;
    border-collapse: collapse;
    width: calc(100% - 32px);
  }
  .fp-summary-breakdown th,
  .fp-summary-breakdown td {
    padding: 5px 8px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.45);
  }
  .fp-summary-breakdown th { color: rgba(255,255,255,0.25); font-weight: 600; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
  .fp-summary-breakdown td.num { text-align: right; font-variant-numeric: tabular-nums; color: rgba(255,255,255,0.65); }

  /* ─── Excluded rows ───────────────────────────────────────────────── */
  .row-excluded { opacity: 0.45; }
  .row-excluded .num-strong { text-decoration: line-through; }

  /* ─── Adjustment sub-label ────────────────────────────────────────── */
  .adjustment-sublabel {
    display: block;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap;
  }

  /* ═══════════════════════════════════════════════════════════════════
     RESERVATION DETAIL — macOS-style panel content
     ═══════════════════════════════════════════════════════════════════ */

  /* ── Drawer header ── */
  .drawer-header {
    padding: 18px 20px 16px;
    border-bottom: 1px solid var(--border-base);
  }
  .drawer-header-airbnb  { background: linear-gradient(160deg, rgba(255,90,95,0.10)  0%, transparent 100%); }
  .drawer-header-booking { background: linear-gradient(160deg, rgba(79,142,247,0.10) 0%, transparent 100%); }
  .drawer-header-other   { background: linear-gradient(160deg, rgba(124,109,255,0.08) 0%, transparent 100%); }
  .drawer-header-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 10px; margin-bottom: 10px;
  }
  .drawer-header-meta-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .drawer-guest-name {
    font-size: 16px; font-weight: 800; color: var(--text-100);
    line-height: 1.25; letter-spacing: -0.01em;
  }
  .drawer-stay-label {
    font-size: 12px; color: var(--text-300);
    margin-top: 3px; font-variant-numeric: tabular-nums; font-weight: 500;
  }
  .drawer-meta-item {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-300); font-weight: 500;
  }
  .drawer-code {
    font-size: 11px; color: var(--text-muted);
    font-variant-numeric: tabular-nums; letter-spacing: 0.03em; font-weight: 500;
  }
  .drawer-txn-total {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px;
    background: var(--bg-panel);
    border-radius: 7px; border: 1px solid var(--border-subtle);
  }

  /* Section container */
  .drawer-section {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border-base);
  }
  .drawer-section:last-child { border-bottom: none; }

  /* Section header */
  .drawer-section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 12px;
  }
  .drawer-section-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--text-300);
  }
  .drawer-section-note {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* Metric grid — 2-column */
  .drawer-metric-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .drawer-metric {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 10px 12px;
    background: var(--bg-panel);
    border: 1px solid var(--border-base);
    border-top-color: var(--border-top);
    border-radius: 9px;
    transition: border-color 0.13s;
  }
  .drawer-metric:hover { border-color: var(--border-active); }
  .drawer-metric-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-300);
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .drawer-metric-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-100);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .drawer-metric-value-strong {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-100);
    letter-spacing: -0.02em;
  }
  .drawer-metric-sub {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  /* City tax status pills */
  .drawer-status {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 7px 11px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
  }
  .drawer-status-ok {
    background: linear-gradient(135deg, rgba(34,197,94,0.12), rgba(34,197,94,0.05));
    border: 1px solid rgba(34,197,94,0.22);
    color: #4ade80;
  }
  .drawer-status-warn {
    background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.05));
    border: 1px solid rgba(245,158,11,0.22);
    color: #fbbf24;
  }

  /* Calculation formula */
  .drawer-formula { display: flex; flex-direction: column; gap: 8px; }

  /* Anchor — the payout starting value */
  .drawer-anchor {
    background: linear-gradient(135deg, rgba(124,109,255,0.14) 0%, rgba(124,109,255,0.05) 100%);
    border: 1px solid rgba(124,109,255,0.25);
    border-top-color: rgba(124,109,255,0.35);
    border-radius: 10px;
    padding: 13px 15px;
  }
  .drawer-anchor-label {
    font-size: 9px;
    color: rgba(124,109,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    margin-bottom: 5px;
  }
  .drawer-anchor-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .drawer-anchor-value {
    font-size: 22px;
    font-weight: 800;
    color: var(--text-100);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .drawer-anchor-note {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Inline informational note */
  .drawer-inline-note {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-muted);
    padding: 3px 2px;
  }
  .drawer-inline-note svg {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
  }

  /* Deduction flow block */
  .drawer-flow-block {
    background: var(--bg-panel);
    border: 1px solid var(--border-base);
    border-radius: 10px;
    overflow: hidden;
  }

  /* Individual deduction row */
  .drawer-flow-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 13px;
    border-bottom: 1px solid var(--border-base);
    gap: 8px;
  }
  .drawer-flow-row:last-child { border-bottom: none; }
  .drawer-flow-label {
    font-size: 12px;
    color: var(--text-200);
    font-weight: 400;
  }
  .drawer-flow-label-dim {
    color: var(--text-muted);
    font-size: 11px;
  }
  .drawer-flow-value {
    font-size: 12px;
    color: var(--text-200);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    font-weight: 500;
  }
  .drawer-flow-value-dim {
    color: var(--text-muted);
    font-weight: 400;
  }

  /* Total row — = Cena ubytování */
  .drawer-flow-total {
    background: linear-gradient(90deg, rgba(34,197,94,0.08), rgba(34,197,94,0.03));
    border-top: 1px solid rgba(34,197,94,0.15) !important;
  }
  .drawer-flow-total .drawer-flow-label {
    font-weight: 700;
    color: var(--text-100);
    font-size: 13px;
  }
  .drawer-flow-total .drawer-flow-value {
    font-weight: 800;
    font-size: 15px;
    color: #4ade80;
    letter-spacing: -0.01em;
  }

  /* ═══════════════════════════════════════════════════════════════════════
     LIGHT THEME — [data-theme="light"] overrides
     ═══════════════════════════════════════════════════════════════════════ */
  [data-theme="light"] {
    --bg-0:      #eef0f8;
    --bg-1:      #f4f5fb;
    --bg-2:      #eaecf5;
    --bg-3:      #ffffff;
    --bg-4:      #f8f9fe;

    --shadow-sm: 0 1px 4px rgba(0,0,0,.08);
    --shadow-md: 0 4px 18px rgba(0,0,0,.12);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.18);

    --border-base:   rgba(0,0,0,0.08);
    --border-top:    rgba(0,0,0,0.12);
    --border-active: rgba(124,109,255,0.5);

    --text-100: #1e2240;
    --text-200: #4d5a7c;
    --text-300: #8894b8;

    /* Legacy aliases */
    --bg-root:        var(--bg-1);
    --bg-panel:       var(--bg-2);
    --bg-card:        var(--bg-3);
    --bg-card-hover:  var(--bg-4);
    --border-subtle:  var(--border-base);
    --bg:             var(--bg-1);
    --surface:        var(--bg-3);
    --surface-raised: var(--bg-4);
    --text-primary:   var(--text-100);
    --text-secondary: var(--text-200);
    --text-muted:     var(--text-300);
    --border:         var(--border-base);
    --green-dim:      rgba(34,197,94,0.1);
    --red-dim:        rgba(244,63,94,0.1);
    --amber-dim:      rgba(245,158,11,0.1);
    --blue-dim:       rgba(59,130,246,0.1);
    --accent-dim:     rgba(124,109,255,0.1);
    --accent-text:    #6355e8;
  }

  [data-theme="light"] body {
    background: var(--bg-0);
    color: var(--text-100);
  }
  [data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.14); }
  [data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.24); }

  /* ── Sidebar ── */
  [data-theme="light"] .sidebar {
    background: #ffffff;
    border-right-color: rgba(0,0,0,0.08);
  }
  [data-theme="light"] .sidebar-logo {
    border-bottom-color: rgba(0,0,0,0.08);
  }
  [data-theme="light"] .sidebar-section-label { color: rgba(0,0,0,0.32); }
  [data-theme="light"] .nav-item { color: rgba(0,0,0,0.48); }
  [data-theme="light"] .nav-item:hover {
    background: rgba(0,0,0,0.05);
    color: rgba(0,0,0,0.82);
    border-color: rgba(0,0,0,0.06);
  }
  [data-theme="light"] .nav-item.active {
    background: rgba(124,109,255,0.1);
    color: #5648d9;
  }
  [data-theme="light"] .nav-item svg { opacity: 0.45; }
  [data-theme="light"] .nav-item:hover svg,
  [data-theme="light"] .nav-item.active svg { opacity: 1; }

  [data-theme="light"] .sb-month-btn {
    background: rgba(0,0,0,0.05);
    border-color: rgba(0,0,0,0.1);
    color: var(--text-200);
  }
  [data-theme="light"] .sb-month-btn:hover { background: rgba(0,0,0,0.09); color: var(--text-100); }
  [data-theme="light"] .sb-obj-item { color: rgba(0,0,0,0.45); }
  [data-theme="light"] .sb-obj-item:hover {
    color: rgba(0,0,0,0.75);
    background: rgba(0,0,0,0.04);
    border-color: rgba(0,0,0,0.06);
  }
  [data-theme="light"] .sb-obj-dot:not([data-h]) { background: rgba(0,0,0,0.18); }
  [data-theme="light"] .sb-obj-dot[data-h="ok"]     { background: var(--color-green);   box-shadow: 0 0 5px rgba(34,197,94,0.7); }
  [data-theme="light"] .sb-obj-dot[data-h="issues"] { background: var(--color-amber);   box-shadow: 0 0 5px rgba(245,158,11,0.7); }
  [data-theme="light"] .sb-obj-dot[data-h="action"] { background: var(--color-primary); box-shadow: 0 0 5px rgba(139,125,255,0.7); }
  [data-theme="light"] .sb-obj-dot[data-h="empty"]  { background: rgba(0,0,0,0.15); }

  /* ── Main content ── */
  [data-theme="light"] .main-content {
    background:
      radial-gradient(ellipse 80% 45% at 65% -5%, rgba(80,60,220,0.04) 0%, transparent 60%),
      var(--bg-1);
  }

  /* ── Cards ── */
  [data-theme="light"] .card {
    background: var(--bg-3);
    border-color: rgba(0,0,0,0.08);
    border-top-color: rgba(0,0,0,0.11);
  }
  [data-theme="light"] .card-header {
    background: rgba(0,0,0,0.025);
    border-bottom-color: rgba(0,0,0,0.07);
  }
  [data-theme="light"] .kpi-card {
    background: var(--bg-3);
    border-color: rgba(0,0,0,0.08);
    border-top-color: rgba(0,0,0,0.11);
  }
  [data-theme="light"] .kpi-card:hover { border-color: rgba(0,0,0,0.14); }
  [data-theme="light"] .kpi-label { color: rgba(0,0,0,0.44); }
  [data-theme="light"] .kpi-sub { color: rgba(0,0,0,0.4); }
  [data-theme="light"] .kpi-card-neutral::before {
    background: linear-gradient(90deg, rgba(0,0,0,0.15), rgba(0,0,0,0.06));
    box-shadow: 0 0 10px 1px rgba(0,0,0,0.06);
  }

  /* ── Badges ── */
  [data-theme="light"] .badge-neutral {
    background: rgba(0,0,0,0.06);
    color: rgba(0,0,0,0.5);
    border-color: rgba(0,0,0,0.1);
  }
  [data-theme="light"] .channel-other {
    background: rgba(0,0,0,0.05);
    color: rgba(0,0,0,0.5);
    border-color: rgba(0,0,0,0.1);
  }

  /* ── Buttons ── */
  [data-theme="light"] .btn-ghost {
    background: rgba(0,0,0,0.04);
    color: rgba(0,0,0,0.5);
    border-color: rgba(0,0,0,0.1);
  }
  [data-theme="light"] .btn-ghost:hover {
    background: rgba(0,0,0,0.08);
    color: rgba(0,0,0,0.82);
    border-color: rgba(0,0,0,0.15);
  }
  [data-theme="light"] .btn-secondary {
    background: rgba(0,0,0,0.05);
    color: var(--text-100);
    border-color: rgba(0,0,0,0.1);
  }
  [data-theme="light"] .btn-secondary:hover {
    background: rgba(0,0,0,0.09);
    border-color: rgba(0,0,0,0.14);
  }
  [data-theme="light"] .btn-lock {
    background: rgba(0,0,0,0.04);
    color: rgba(0,0,0,0.35);
    border-color: rgba(0,0,0,0.08);
  }
  [data-theme="light"] .btn-lock:hover {
    background: rgba(0,0,0,0.08);
    color: rgba(0,0,0,0.7);
    border-color: rgba(0,0,0,0.13);
  }

  /* ── Data table ── */
  [data-theme="light"] .data-table th {
    color: rgba(0,0,0,0.35);
    border-bottom-color: rgba(0,0,0,0.08);
    background: rgba(0,0,0,0.025);
  }
  [data-theme="light"] .data-table td { border-bottom-color: rgba(0,0,0,0.06); }
  [data-theme="light"] .data-table tbody tr:nth-child(odd) td { background: rgba(0,0,0,0.018); }
  [data-theme="light"] .data-table tbody tr:hover td { background: rgba(0,0,0,0.04); }
  [data-theme="light"] .data-table tfoot td {
    border-top-color: rgba(0,0,0,0.08);
    background: rgba(0,0,0,0.04);
  }
  [data-theme="light"] th.drop-target { background: rgba(124,109,255,.06); }

  /* ── Filter tabs ── */
  [data-theme="light"] .filter-tabs {
    background: rgba(0,0,0,0.04);
    border-color: rgba(0,0,0,0.08);
  }
  [data-theme="light"] .filter-tab { color: rgba(0,0,0,0.38); }
  [data-theme="light"] .filter-tab:hover { color: rgba(0,0,0,0.68); background: rgba(0,0,0,0.05); }
  [data-theme="light"] .filter-tab.active {
    background: rgba(0,0,0,0.07);
    color: var(--text-100);
    border-color: rgba(0,0,0,0.09);
  }

  /* ── Form inputs ── */
  [data-theme="light"] .form-input {
    background: #ffffff;
    border-color: rgba(0,0,0,0.14);
    border-top-color: rgba(0,0,0,0.1);
    color: var(--text-100);
  }
  [data-theme="light"] .form-input:focus {
    background: #fff;
    border-color: rgba(124,109,255,0.6);
    box-shadow: 0 0 0 3px rgba(124,109,255,0.14);
  }
  [data-theme="light"] .form-input::placeholder { color: rgba(0,0,0,0.28); }
  [data-theme="light"] select.form-input option { background: #ffffff; color: var(--text-100); }
  [data-theme="light"] .form-label { color: rgba(0,0,0,0.4); }

  /* ── Notify dismiss ── */
  [data-theme="light"] .notify [data-dismiss-banner],
  [data-theme="light"] .notify-dismiss {
    border-color: rgba(0,0,0,0.1);
    background: rgba(0,0,0,0.04);
  }
  [data-theme="light"] .notify [data-dismiss-banner]:hover,
  [data-theme="light"] .notify-dismiss:hover {
    background: rgba(0,0,0,0.08);
    border-color: rgba(0,0,0,0.14);
  }

  /* ── Property rows ── */
  [data-theme="light"] .prop-row:hover {
    border-color: rgba(0,0,0,0.1);
    box-shadow: var(--shadow-sm), inset 2px 0 0 rgba(139,125,255,0.4);
  }
  [data-theme="light"] .prop-row:hover .pr-arrow { color: rgba(0,0,0,0.5); }
  [data-theme="light"] .pr-dot:not([data-h]) { background: rgba(0,0,0,0.18); }
  [data-theme="light"] .pr-dot[data-h="ok"]     { background: var(--color-green);   box-shadow: 0 0 5px rgba(34,197,94,0.7); }
  [data-theme="light"] .pr-dot[data-h="issues"] { background: var(--color-amber);   box-shadow: 0 0 5px rgba(245,158,11,0.7); }
  [data-theme="light"] .pr-dot[data-h="action"] { background: var(--color-primary); box-shadow: 0 0 5px rgba(139,125,255,0.7); }

  /* ── Sticky property header ── */
  [data-theme="light"] .prop-page-header {
    background: rgba(244,245,251,0.88);
    border-bottom-color: rgba(0,0,0,0.09);
  }
  [data-theme="light"] .prop-breadcrumb { color: rgba(0,0,0,0.38); }
  [data-theme="light"] .prop-breadcrumb-link { color: rgba(0,0,0,0.4); }
  [data-theme="light"] .prop-breadcrumb-link:hover { color: rgba(0,0,0,0.72); }

  /* ── Month nav ── */
  [data-theme="light"] .month-nav {
    background: rgba(0,0,0,0.04);
    border-color: rgba(0,0,0,0.08);
  }
  [data-theme="light"] .month-nav-arrow { color: rgba(0,0,0,0.38); }
  [data-theme="light"] .month-nav-arrow:hover {
    background: rgba(0,0,0,0.07);
    color: rgba(0,0,0,0.82);
  }

  /* ── Section divider ── */
  [data-theme="light"] .section-divider-label { color: rgba(0,0,0,0.32); }
  [data-theme="light"] .section-divider-line {
    background: linear-gradient(90deg, rgba(0,0,0,0.08), transparent);
  }

  /* ── Misc ── */
  [data-theme="light"] code {
    background: rgba(0,0,0,0.06);
    color: #5648d9;
  }
  [data-theme="light"] .meta-chip {
    background: rgba(0,0,0,0.05);
    color: var(--text-200);
  }
  [data-theme="light"] .tbl-reset-btn:hover {
    color: var(--text-100);
    border-color: rgba(0,0,0,0.15);
    background: rgba(0,0,0,0.04);
  }
  [data-theme="light"] .rcs-val[data-copy]:hover { background: rgba(0,0,0,0.07); }
  [data-theme="light"] .res-compact-strip {
    background: rgba(0,0,0,0.018);
