<style>
  /* ═══════════════════════════════════════════════════════════════════════
     DESIGN TOKENS — Rentero Design System v3
     Aesthetic: Dark atmospheric glass — Grok/xAI, FedEx, iOS liquid glass
     ═══════════════════════════════════════════════════════════════════════ */
  :root {
    /* ── Spacing (4pt scale) ── */
    --space-xs:  4px;
    --space-sm:  8px;
    --space-md:  12px;
    --space-lg:  16px;
    --space-xl:  24px;
    --space-2xl: 32px;
    --space-3xl: 48px;
    --space-4xl: 64px;
    --space-5xl: 96px;

    /* ── Radius ── */
    --radius-xs:   6px;
    --radius-sm:   8px;
    --radius-md:   12px;
    --radius-lg:   16px;
    --radius-xl:   20px;
    --radius-full: 9999px;

    /* ── Shadows — dark mode needs stronger, cooler shadows ── */
    --shadow-sm:  0 1px 2px oklch(0 0 0 / 0.4), 0 0 1px oklch(0 0 0 / 0.3);
    --shadow-md:  0 4px 12px oklch(0 0 0 / 0.5), 0 0 1px oklch(0 0 0 / 0.3);
    --shadow-lg:  0 12px 40px oklch(0 0 0 / 0.65), 0 0 1px oklch(0 0 0 / 0.3);
    --shadow-xl:  0 24px 60px oklch(0 0 0 / 0.7);

    /* ── Timing — Emil Kowalski: custom curves, never ease-in ── */
    --duration-instant: 80ms;
    --duration-fast:    150ms;
    --duration-normal:  250ms;
    --duration-slow:    350ms;
    --duration-stagger: 25ms;
    --ease-out:      cubic-bezier(0.23, 1, 0.32, 1);
    --ease-in-out:   cubic-bezier(0.77, 0, 0.175, 1);
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-drawer:   cubic-bezier(0.32, 0.72, 0, 1);
    --ease-spring:   cubic-bezier(0.34, 1.56, 0.64, 1);

    /* ── Typography — Geist for UI, Geist Mono for data ── */
    --font-sans:  'Geist', system-ui, -apple-system, sans-serif;
    --font-mono:  'Geist Mono', 'SF Mono', 'JetBrains Mono', monospace;
    --text-2xs:  0.625rem;   /* 10px */
    --text-xs:   0.6875rem;  /* 11px */
    --text-sm:   0.8125rem;  /* 13px */
    --text-base: 0.875rem;   /* 14px */
    --text-lg:   1rem;       /* 16px */
    --text-xl:   1.25rem;    /* 20px */
    --text-2xl:  1.5rem;     /* 24px */
    --text-3xl:  2rem;       /* 32px */

    /* ── App geometry ── */
    --sidebar-w:   240px;
    --bottombar-h: 56px;
    --header-h:    52px;

    /* ═══════════════════════════════════════════
       DARK THEME (default) — Near-black canvas
       ═══════════════════════════════════════════ */

    /* Background scale: 5 steps from void to raised */
    --bg-0:   oklch(0.08 0.012 260);   /* void — deepest background */
    --bg-1:   oklch(0.10 0.012 260);   /* canvas — main content area */
    --bg-2:   oklch(0.13 0.010 260);   /* recessed — card insets, table headers */
    --bg-3:   oklch(0.16 0.008 260);   /* surface — cards, panels */
    --bg-4:   oklch(0.20 0.006 260);   /* raised — hovered cards, dropdowns */

    /* Text — high contrast on near-black */
    --text-100: oklch(0.95 0.005 260);  /* primary — titles, values */
    --text-200: oklch(0.72 0.010 260);  /* secondary — labels, descriptions */
    --text-300: oklch(0.48 0.008 260);  /* muted — placeholders, disabled */

    /* Borders — white-opacity glass system */
    --border-base:   oklch(1 0 0 / 0.06);
    --border-top:    oklch(1 0 0 / 0.10);
    --border-active: oklch(0.60 0.16 280 / 0.30);

    /* Glass surface treatment */
    --glass-highlight: inset 0 1px 0 oklch(1 0 0 / 0.04);
    --glass-highlight-strong: inset 0 1px 0 oklch(1 0 0 / 0.07);

    /* Neutral foreground overlay (flips with theme) */
    --fg: 1 0 0;

    /* ── Single accent: purple (the "signal" color) ── */
    --accent:       oklch(0.65 0.18 280);
    --accent-dim:   oklch(0.65 0.18 280 / 0.10);
    --accent-glow:  oklch(0.65 0.18 280 / 0.25);
    --accent-text:  oklch(0.80 0.14 280);

    /* Semantic colors */
    --color-green:   oklch(0.72 0.19 155);
    --color-amber:   oklch(0.78 0.14 75);
    --color-red:     oklch(0.68 0.20 25);
    --color-blue:    oklch(0.68 0.15 250);
    --color-teal:    oklch(0.72 0.12 180);
    --color-orange:  oklch(0.72 0.15 55);

    /* Dim variants — colored translucent backgrounds */
    --green-dim:     oklch(0.72 0.19 155 / 0.08);
    --amber-dim:     oklch(0.78 0.14 75  / 0.08);
    --red-dim:       oklch(0.68 0.20 25  / 0.08);
    --blue-dim:      oklch(0.68 0.15 250 / 0.08);
    --teal-dim:      oklch(0.72 0.12 180 / 0.08);

    /* Atmospheric ambient — cosmic nebula */
    --ambient-primary: radial-gradient(
      ellipse 70% 50% at 85% 0%,
      rgba(88, 40, 140, 0.22) 0%,
      rgba(55, 25, 100, 0.10) 40%,
      transparent 72%
    );
    --ambient-secondary: radial-gradient(
      ellipse 60% 50% at 10% 100%,
      rgba(140, 60, 30, 0.14) 0%,
      rgba(45, 30, 80, 0.06) 45%,
      transparent 70%
    );
    --ambient-tertiary: radial-gradient(
      ellipse 80% 60% at 50% 50%,
      rgba(30, 20, 60, 0.10) 0%,
      transparent 60%
    );

    /* ── Legacy aliases (keep during migration) ── */
    --bg-root:        var(--bg-1);
    --bg-panel:       var(--bg-2);
    --bg-card:        var(--bg-3);
    --bg-card-hover:  var(--bg-4);
    --border-subtle:  var(--border-base);
    --bg:             var(--bg-1);
    --surface:        var(--bg-3);
    --surface-raised: var(--bg-4);
    --text-primary:   var(--text-100);
    --text-secondary: var(--text-200);
    --text-muted:     var(--text-300);
    --border:         var(--border-base);
    --color-primary:  var(--accent);
    --primary-dim:    var(--accent-dim);
    --green:          var(--color-green);
    --red:            var(--color-red);
    --amber:          var(--color-amber);
    --blue:           var(--color-blue);

  /* ── property-page redesign: brand (Rentero) + DPH (teal) ── */
  --brand:        oklch(0.66 0.18 285);
  --brand-soft:   oklch(0.66 0.18 285 / 0.12);
  --brand-line:   oklch(0.66 0.18 285 / 0.35);
  --brand-text:   oklch(0.80 0.14 285);
  --dph:          oklch(0.72 0.12 185);
  --dph-soft:     oklch(0.72 0.12 185 / 0.10);
  --dph-line:     oklch(0.72 0.12 185 / 0.30);
  --dph-text:     oklch(0.78 0.10 185);
  --glass-hi:     inset 0 1px 0 oklch(1 0 0 / 0.04);
  }

  /* ── Light theme overrides ──
     Design principles applied:
     - Neutrals tinted toward brand hue 285° (not 260°). Subtle chroma 0.004-0.008
       creates subconscious cohesion with the purple accent.
     - --bg-3 is NOT pure white (0.995 0.002 285) — pure black/white never
       appears in nature.
     - Semantic --color-* re-derived for light context: L≈0.55, restrained
       chroma 0.16-0.18 (not 0.20+) so they read crisp instead of garish.
     - Shadows hue 285° — single plum-tinted personality across the app.
     - Ambient uses brand purple ≤10% intensity (60-30-10 rule). */
  [data-theme="light"] {
    --bg-0:   oklch(0.93 0.005 285);   /* page void / outside cards */
    --bg-1:   oklch(0.985 0.004 285);  /* canvas — body */
    --bg-2:   oklch(0.965 0.006 285);  /* recessed — table headers, sidebars */
    --bg-3:   oklch(0.995 0.002 285);  /* surface — cards (near-white, micro-violet) */
    --bg-4:   oklch(0.985 0.008 285);  /* raised — hovered cards, dropdowns */

    --text-100: oklch(0.18 0.018 285);
    --text-200: oklch(0.40 0.014 285);
    --text-300: oklch(0.55 0.010 285);

    --border-base:   oklch(0 0 0 / 0.08);
    --border-top:    oklch(0 0 0 / 0.12);
    --border-active: oklch(0.50 0.20 285 / 0.40);

    --fg: 0 0 0;

    --glass-highlight:        inset 0 1px 0 oklch(1 0 0 / 0.6);
    --glass-highlight-strong: inset 0 1px 0 oklch(1 0 0 / 0.8);

    --shadow-sm: 0 1px 2px  oklch(0.20 0.04 285 / 0.06);
    --shadow-md: 0 4px 14px oklch(0.20 0.04 285 / 0.08);
    --shadow-lg: 0 16px 48px oklch(0.20 0.04 285 / 0.14);
    --shadow-xl: 0 24px 60px oklch(0.20 0.04 285 / 0.18);

    /* Semantic — re-saturated for light context */
    --color-green:   oklch(0.55 0.16 150);
    --color-red:     oklch(0.55 0.18 25);
    --color-amber:   oklch(0.62 0.14 75);
    --color-blue:    oklch(0.52 0.16 250);
    --color-teal:    oklch(0.55 0.10 195);
    --color-orange:  oklch(0.60 0.16 50);

    /* Accent — same brand hue, darkened for white-bg contrast */
    --accent:       oklch(0.50 0.20 285);
    --accent-dim:   oklch(0.50 0.20 285 / 0.10);
    --accent-glow:  oklch(0.50 0.20 285 / 0.20);
    --accent-text:  oklch(0.40 0.20 285);

    --ambient-primary: radial-gradient(
      ellipse 70% 50% at 85% 0%,
      oklch(0.62 0.20 285 / 0.10) 0%,
      oklch(0.62 0.20 285 / 0.04) 40%,
      transparent 72%
    );
    --ambient-secondary: radial-gradient(
      ellipse 60% 50% at 10% 100%,
      oklch(0.68 0.18 35 / 0.08) 0%,
      oklch(0.68 0.18 35 / 0.03) 45%,
      transparent 70%
    );
    --ambient-tertiary: none;

    --brand:       oklch(0.50 0.20 285);
    --brand-soft:  oklch(0.50 0.20 285 / 0.10);
    --brand-line:  oklch(0.50 0.20 285 / 0.30);
    --brand-text:  oklch(0.40 0.20 285);
    --dph:         oklch(0.52 0.13 195);
    --dph-soft:    oklch(0.52 0.13 195 / 0.10);
    --dph-line:    oklch(0.52 0.13 195 / 0.30);
    --dph-text:    oklch(0.42 0.13 195);
    --glass-hi:    inset 0 1px 0 oklch(1 0 0 / 0.7);
  }

  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg-1);
    color: var(--text-100);
    min-height: 100vh;
    font-size: var(--text-base);
    line-height: 1.5;
    font-kerning: normal;
    font-feature-settings: 'kern' 1, 'liga' 1, 'calt' 1;
    -webkit-font-feature-settings: 'kern' 1, 'liga' 1, 'calt' 1;
    text-rendering: optimizeLegibility;
  }

  /* ── Scrollbar — near-invisible until hovered ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: oklch(1 0 0 / 0.08); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: oklch(1 0 0 / 0.15); }

  /* ── Base type utilities ── */
  a { color: inherit; text-decoration: none; }
  code {
    font-family: var(--font-mono);
    background: oklch(1 0 0 / 0.05);
    padding: 2px 6px;
    border-radius: var(--radius-xs);
    font-size: var(--text-xs);
  }
  details > summary { list-style: none; }
  details > summary::-webkit-details-marker { display: none; }

  /* ── Smooth theme switching ──
     Emil principle: UI animations < 300ms. Custom ease-out curve
     (already defined in :root --ease-out) feels crisper than generic `ease`. */
  html.theme-switching,
  html.theme-switching *,
  html.theme-switching *::before,
  html.theme-switching *::after {
    transition: background-color 250ms var(--ease-out, cubic-bezier(0.23, 1, 0.32, 1)),
                color           250ms var(--ease-out, cubic-bezier(0.23, 1, 0.32, 1)),
                border-color    250ms var(--ease-out, cubic-bezier(0.23, 1, 0.32, 1)),
                box-shadow      250ms var(--ease-out, cubic-bezier(0.23, 1, 0.32, 1)),
                fill            250ms var(--ease-out, cubic-bezier(0.23, 1, 0.32, 1)),
                stroke          250ms var(--ease-out, cubic-bezier(0.23, 1, 0.32, 1))
                !important;
  }
</style>
