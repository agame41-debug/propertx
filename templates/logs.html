{% extends "base.html" %}
{% block title %}Logy — Rentero{% endblock %}

{% block content %}

<div style="display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap;">
  <div>
    <h1 style="font-size:22px;font-weight:700;color:var(--text-100);letter-spacing:-0.02em;">Logy aplikace</h1>
    <div style="font-size:13px;color:var(--text-300);margin-top:3px;">Runtime logy serveru</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-200);cursor:pointer;">
      <input type="checkbox" id="autoRefresh" checked style="accent-color:var(--color-primary);">
      Auto-refresh
    </label>
    <input type="number" id="logLimit" value="200" min="10" max="1000" class="form-input" style="width:80px;">
    <button onclick="refreshLogs()" class="btn btn-primary btn-sm">Obnovit</button>
    <button onclick="clearLogs()" class="btn btn-destructive btn-sm">Vymazat logy</button>
  </div>
</div>

<div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px;">
  <div class="kpi-card">
    <div class="kpi-label">Celkem logů</div>
    <div class="kpi-value" id="totalLogs">0</div>
  </div>
  <div class="kpi-card kpi-card-red">
    <div class="kpi-label">Chyby</div>
    <div class="kpi-value" id="errorCount" style="color:var(--color-red);">0</div>
  </div>
  <div class="kpi-card kpi-card-amber">
    <div class="kpi-label">Varování</div>
    <div class="kpi-value" id="warningCount" style="color:var(--color-amber);">0</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">Info</div>
    <div class="kpi-value" id="infoCount">0</div>
  </div>
</div>

<div class="card" id="logsContainer">
  <div style="padding:40px;text-align:center;color:var(--text-300);font-size:13px;">Načítám logy...</div>
</div>

<script>
(function() {
  var autoRefreshEnabled = true;
  var autoRefreshInterval = null;

  var autoRefreshCheckbox = document.getElementById('autoRefresh');
  autoRefreshCheckbox.addEventListener('change', function(e) {
    autoRefreshEnabled = e.target.checked;
    if (autoRefreshEnabled) { startAutoRefresh(); }
    else { stopAutoRefresh(); }
  });

  window.refreshLogs = function() {
    var limit = parseInt(document.getElementById('logLimit').value) || 200;
    fetch('/api/logs?limit=' + limit)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var logs = data.logs || [];

        document.getElementById('totalLogs').textContent = logs.length;
        var levelCounts = {};
        logs.forEach(function(log) {
          var level = log.level || 'INFO';
          levelCounts[level] = (levelCounts[level] || 0) + 1;
        });
        document.getElementById('errorCount').textContent = levelCounts['ERROR'] || 0;
        document.getElementById('warningCount').textContent = levelCounts['WARNING'] || 0;
        document.getElementById('infoCount').textContent = levelCounts['INFO'] || 0;

        if (logs.length === 0) {
          document.getElementById('logsContainer').innerHTML =
            '<div style="padding:48px;text-align:center;color:var(--text-300);font-size:13px;">Žádné logy k zobrazení</div>';
          return;
        }

        var html = '<div style="overflow-x:auto;"><table class="data-table responsive-cards">';
        html += '<thead><tr>';
        html += '<th style="width:160px;">Čas</th>';
        html += '<th style="width:80px;">Úroveň</th>';
        html += '<th style="width:250px;">Logger</th>';
        html += '<th>Zpráva</th>';
        html += '</tr></thead><tbody>';
        logs.forEach(function(log) {
          var badgeClass = 'badge-neutral';
          if (log.level === 'ERROR') badgeClass = 'badge-red';
          else if (log.level === 'WARNING') badgeClass = 'badge-amber';
          else if (log.level === 'INFO') badgeClass = 'badge-blue';
          else if (log.level === 'SUCCESS') badgeClass = 'badge-green';
          html += '<tr>';
          html += '<td data-label="Čas" class="num" style="font-size:12px;color:var(--text-300);white-space:nowrap;">' + esc(formatTime(log.timestamp)) + '</td>';
          html += '<td data-label="Úroveň"><span class="badge ' + badgeClass + '">' + esc(log.level) + '</span></td>';
          html += '<td data-label="Logger" style="font-size:11px;color:var(--text-300);font-family:var(--font-mono);">' + esc(log.logger) + '</td>';
          html += '<td data-label="Zpráva" style="word-break:break-word;max-width:600px;">' + esc(log.message) + '</td>';
          html += '</tr>';
        });
        html += '</tbody></table></div>';
        document.getElementById('logsContainer').innerHTML = html;
      })
      .catch(function(err) {
        console.error('Log fetch error:', err);
        document.getElementById('logsContainer').innerHTML =
          '<div style="padding:48px;text-align:center;color:var(--text-300);font-size:13px;">Chyba při načítání logů</div>';
      });
  };

  window.clearLogs = function() {
    if (!confirm('Vymazat všechny logy?')) return;
    var csrfToken = document.querySelector('meta[name="csrf-token"]').content;
    fetch('/api/logs/clear', {
      method: 'POST',
      headers: {'X-CSRF-Token': csrfToken}
    })
      .then(function() { refreshLogs(); })
      .catch(function(err) { console.error(err); alert('Chyba při mazání logů'); });
  };

  function formatTime(isoString) {
    var date = new Date(isoString);
    return date.toLocaleString('cs-CZ').replace(/^\d+\.\s/, '');
  }

  function esc(text) {
    if (!text) return '';
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function startAutoRefresh() {
    autoRefreshInterval = setInterval(refreshLogs, 3000);
  }

  function stopAutoRefresh() {
    if (autoRefreshInterval) {
      clearInterval(autoRefreshInterval);
      autoRefreshInterval = null;
    }
  }

  refreshLogs();
  if (autoRefreshEnabled) startAutoRefresh();
})();
</script>

{% endblock %}
